<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1A1A2E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AI 다이어리</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0F0F1E;
  --bg2: #1A1A2E;
  --bg3: #252545;
  --card: #1E1E35;
  --card2: #252540;
  --border: rgba(255,255,255,0.08);
  --accent: #FF6B35;
  --accent2: #FF8F5E;
  --text: #F0F0F5;
  --text2: #9999BB;
  --text3: #6666AA;
  --red: #E74C3C;
  --yellow: #F39C12;
  --green: #27AE60;
  --blue: #3498DB;
  --gray: #636E72;
  --tab-h: 64px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; overflow: hidden; }

/* ── 앱 구조 ── */
#app { height: 100%; display: flex; flex-direction: column; }
.screen { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: calc(var(--tab-h) + var(--safe-bottom) + 16px); display: none; }
.screen.active { display: block; }

/* ── 탭바 ── */
.tabbar {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(var(--tab-h) + var(--safe-bottom));
  background: var(--bg2); border-top: 1px solid var(--border);
  display: flex; z-index: 100;
  padding-bottom: var(--safe-bottom);
}
.tab-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; cursor: pointer; color: var(--text3); transition: color 0.2s; border: none; background: none;
  font-family: 'Noto Sans KR', sans-serif;
}
.tab-btn.active { color: var(--accent); }
.tab-btn .tab-icon { font-size: 22px; position: relative; }
.tab-btn .tab-label { font-size: 10px; font-weight: 500; }
.tab-badge {
  position: absolute; top: -4px; right: -8px;
  background: var(--red); color: white; font-size: 10px; font-weight: 700;
  border-radius: 10px; padding: 1px 5px; min-width: 16px; text-align: center;
}

/* ── 공통 헤더 ── */
.page-header {
  position: sticky; top: 0; z-index: 50;
  background: var(--bg2); padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
}
.page-header h1 { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; }
.page-header .subtitle { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* ── 카드 ── */
.card { background: var(--card); border-radius: 14px; padding: 16px; margin: 0 16px 12px; }
.card-label { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.section-title { font-size: 16px; font-weight: 700; padding: 16px 20px 8px; color: var(--text); }

/* ── 단계 배지 ── */
.stage-badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.stage-잠재 { background: rgba(99,110,114,0.25); color: #B2BEC3; }
.stage-접촉 { background: rgba(52,152,219,0.25); color: #74B9FF; }
.stage-미팅 { background: rgba(243,156,18,0.25); color: #FDCB6E; }
.stage-성사 { background: rgba(39,174,96,0.25); color: #55EFC4; }
.stage-휴면 { background: rgba(99,110,114,0.15); color: #636E72; }

/* ── 팔로업 뱃지 ── */
.follow-urgent { color: var(--red); font-size: 11px; font-weight: 700; }
.follow-today { color: var(--yellow); font-size: 11px; font-weight: 700; }
.follow-ok { color: var(--text3); font-size: 11px; }

/* ── 버튼 ── */
.btn-primary {
  background: var(--accent); color: white; border: none; border-radius: 10px;
  padding: 12px 20px; font-size: 15px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer; width: 100%; transition: opacity 0.15s;
}
.btn-primary:active { opacity: 0.8; }
.btn-secondary {
  background: var(--bg3); color: var(--text); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 16px; font-size: 14px; font-weight: 500; font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer; transition: background 0.15s;
}
.btn-secondary:active { background: var(--card2); }
.btn-icon { background: none; border: none; cursor: pointer; font-size: 20px; padding: 6px; color: var(--text2); }

/* ── 입력 ── */
input, textarea, select {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 10px;
  color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 15px;
  padding: 12px 14px; width: 100%; outline: none; transition: border-color 0.2s;
}
input:focus, textarea:focus, select:focus { border-color: var(--accent); }
select option { background: var(--bg2); }
textarea { resize: none; min-height: 80px; }
.form-group { margin-bottom: 14px; }
.form-label { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 6px; display: block; }

/* ── 모달 ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200;
  display: none; align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg2); border-radius: 20px 20px 0 0; width: 100%; max-width: 480px;
  padding: 20px; max-height: 90vh; overflow-y: auto;
  animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 40px; height: 4px; background: var(--bg3); border-radius: 2px; margin: 0 auto 16px; }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }

/* ── 토스트 ── */
.toast {
  position: fixed; bottom: calc(var(--tab-h) + var(--safe-bottom) + 16px); left: 50%;
  transform: translateX(-50%) translateY(20px); background: var(--bg3);
  color: var(--text); padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: 500;
  z-index: 300; opacity: 0; transition: opacity 0.3s, transform 0.3s; white-space: nowrap;
  border: 1px solid var(--border);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ══════════════════════════════
   홈 화면
══════════════════════════════ */
.home-greeting { padding: 20px 20px 4px; }
.home-greeting .date-line { font-size: 13px; color: var(--text2); margin-bottom: 4px; }
.home-greeting .greet { font-size: 24px; font-weight: 900; letter-spacing: -0.5px; }

.today-contacts { margin: 12px 16px; }
.today-contact-item {
  display: flex; align-items: center; gap: 12px;
  background: var(--card); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px;
  cursor: pointer; transition: background 0.15s;
}
.today-contact-item:active { background: var(--card2); }
.contact-urgency { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.urgency-red { background: var(--red); box-shadow: 0 0 6px var(--red); }
.urgency-yellow { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
.urgency-birthday { background: #E91E8C; box-shadow: 0 0 6px #E91E8C; }
.contact-info { flex: 1; }
.contact-name { font-size: 15px; font-weight: 700; }
.contact-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
.contact-action { font-size: 12px; color: var(--accent); font-weight: 600; }

.activity-progress { }
.progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.progress-label { font-size: 13px; color: var(--text2); width: 70px; flex-shrink: 0; }
.progress-bar-wrap { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.progress-bar { height: 100%; border-radius: 3px; background: var(--accent); transition: width 0.4s ease; }
.progress-count { font-size: 13px; font-weight: 700; color: var(--text); width: 40px; text-align: right; flex-shrink: 0; }

.pipeline-summary {
  display: flex; gap: 8px; overflow-x: auto; padding: 4px 0;
  scrollbar-width: none; -ms-overflow-style: none;
}
.pipeline-summary::-webkit-scrollbar { display: none; }
.pipeline-chip {
  flex-shrink: 0; background: var(--bg3); border-radius: 20px;
  padding: 6px 12px; font-size: 12px; font-weight: 600; text-align: center;
}
.pipeline-chip .pcount { font-size: 18px; font-weight: 900; display: block; }

/* ══════════════════════════════
   고객 화면 (칸반)
══════════════════════════════ */
.kanban-wrap { overflow-x: auto; padding: 12px 16px; display: flex; gap: 12px; scrollbar-width: none; }
.kanban-wrap::-webkit-scrollbar { display: none; }
.kanban-col { flex-shrink: 0; width: 160px; }
.kanban-col-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 10px; border-radius: 10px 10px 0 0; margin-bottom: 1px;
}
.kanban-col-title { font-size: 13px; font-weight: 700; }
.kanban-col-count { font-size: 11px; font-weight: 700; background: rgba(255,255,255,0.1); border-radius: 10px; padding: 1px 6px; }
.kanban-cards { display: flex; flex-direction: column; gap: 8px; min-height: 60px; }
.kanban-card {
  background: var(--card); border-radius: 10px; padding: 10px 12px;
  cursor: pointer; transition: transform 0.15s, background 0.15s;
  border: 1px solid var(--border);
}
.kanban-card:active { transform: scale(0.97); background: var(--card2); }
.kanban-card-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.kanban-card-meta { font-size: 11px; color: var(--text2); }
.kanban-card-follow { font-size: 11px; margin-top: 4px; font-weight: 600; }
.col-잠재 .kanban-col-header { background: rgba(99,110,114,0.2); }
.col-접촉 .kanban-col-header { background: rgba(52,152,219,0.2); }
.col-미팅 .kanban-col-header { background: rgba(243,156,18,0.2); }
.col-성사 .kanban-col-header { background: rgba(39,174,96,0.2); }
.col-휴면 .kanban-col-header { background: rgba(99,110,114,0.1); }
.col-잠재 .kanban-col-title { color: #B2BEC3; }
.col-접촉 .kanban-col-title { color: #74B9FF; }
.col-미팅 .kanban-col-title { color: #FDCB6E; }
.col-성사 .kanban-col-title { color: #55EFC4; }
.col-휴면 .kanban-col-title { color: #636E72; }

.customer-search { margin: 12px 16px 0; display: flex; gap: 8px; }
.customer-search input { flex: 1; padding: 10px 14px; font-size: 14px; }
.add-customer-btn {
  background: var(--accent); border: none; border-radius: 10px;
  width: 44px; height: 44px; font-size: 22px; color: white; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

/* 고객 상세 */
.customer-detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.customer-avatar {
  width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 700; flex-shrink: 0;
}
.customer-detail-name { font-size: 20px; font-weight: 900; }
.customer-detail-sub { font-size: 13px; color: var(--text2); margin-top: 2px; }

.stage-selector { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.stage-btn {
  padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border);
  font-size: 12px; font-weight: 600; font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer; background: var(--bg3); color: var(--text2); transition: all 0.15s;
}
.stage-btn.active-잠재 { background: rgba(99,110,114,0.3); border-color: #B2BEC3; color: #B2BEC3; }
.stage-btn.active-접촉 { background: rgba(52,152,219,0.3); border-color: #74B9FF; color: #74B9FF; }
.stage-btn.active-미팅 { background: rgba(243,156,18,0.3); border-color: #FDCB6E; color: #FDCB6E; }
.stage-btn.active-성사 { background: rgba(39,174,96,0.3); border-color: #55EFC4; color: #55EFC4; }
.stage-btn.active-휴면 { background: rgba(99,110,114,0.2); border-color: #636E72; color: #636E72; }

.memo-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
.memo-item { background: var(--bg3); border-radius: 8px; padding: 10px 12px; }
.memo-date { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
.memo-text { font-size: 14px; line-height: 1.5; }

/* ══════════════════════════════
   활동 화면
══════════════════════════════ */
.activity-date { padding: 12px 20px 0; font-size: 13px; color: var(--text2); font-weight: 600; }
.activity-items { padding: 12px 16px 0; }
.activity-item {
  display: flex; align-items: center; gap: 12px;
  background: var(--card); border-radius: 12px; padding: 12px 16px; margin-bottom: 8px;
}
.activity-icon { font-size: 22px; width: 32px; text-align: center; flex-shrink: 0; }
.activity-name { flex: 1; font-size: 15px; font-weight: 600; }
.activity-counter { display: flex; align-items: center; gap: 8px; }
.counter-btn {
  width: 32px; height: 32px; border-radius: 50%; border: none; cursor: pointer;
  font-size: 18px; display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Sans KR', sans-serif; font-weight: 700; transition: opacity 0.15s;
}
.counter-btn:active { opacity: 0.7; }
.counter-btn.minus { background: var(--bg3); color: var(--text2); }
.counter-btn.plus { background: var(--accent); color: white; }
.counter-num { font-size: 20px; font-weight: 900; width: 32px; text-align: center; font-family: 'Bebas Neue', sans-serif; }

.activity-memo-section { margin: 4px 16px 0; }
.journal-btn {
  display: flex; align-items: center; gap: 10px;
  background: rgba(231,76,60,0.1); border: 1px solid rgba(231,76,60,0.3);
  border-radius: 12px; padding: 14px 16px; cursor: pointer; margin: 0 16px; width: calc(100% - 32px);
  transition: background 0.15s; font-family: 'Noto Sans KR', sans-serif;
}
.journal-btn:active { background: rgba(231,76,60,0.2); }
.journal-btn-icon { font-size: 22px; }
.journal-btn-text { text-align: left; }
.journal-btn-title { font-size: 14px; font-weight: 700; color: var(--text); }
.journal-btn-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }

/* ══════════════════════════════
   리뷰 화면
══════════════════════════════ */
.review-week { padding: 12px 20px 0; font-size: 13px; color: var(--text2); font-weight: 600; }
.review-stat {
  display: flex; align-items: center; gap: 12px; padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.review-stat:last-child { border-bottom: none; }
.review-stat-name { flex: 1; font-size: 14px; }
.review-stat-bar { flex: 1.5; }
.review-stat-count { font-size: 16px; font-weight: 900; color: var(--accent); width: 60px; text-align: right; font-family: 'Bebas Neue', sans-serif; }
.review-stat-goal { font-size: 11px; color: var(--text3); }
.review-result { font-size: 12px; font-weight: 700; width: 40px; text-align: center; }
.result-over { color: var(--green); }
.result-miss { color: var(--red); }
.result-ok { color: var(--yellow); }

.goal-input-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.goal-input-label { flex: 1; font-size: 14px; color: var(--text2); }
.goal-input { width: 70px; padding: 8px 10px; font-size: 16px; font-weight: 700; text-align: center; }

.recommended-customers { }
.rec-customer {
  display: flex; align-items: center; gap: 12px;
  background: var(--card); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px;
  cursor: pointer;
}
.rec-rank { font-size: 18px; font-weight: 900; color: var(--text3); width: 24px; flex-shrink: 0; font-family: 'Bebas Neue', sans-serif; }
.rec-info { flex: 1; }
.rec-name { font-size: 15px; font-weight: 700; }
.rec-reason { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* 거절 저널 모달 */
.situation-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.situation-chip {
  padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border);
  font-size: 13px; font-weight: 500; font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer; background: var(--bg3); color: var(--text2); transition: all 0.15s;
}
.situation-chip.selected { background: rgba(231,76,60,0.2); border-color: var(--red); color: var(--red); }

/* 빈 상태 */
.empty-state { text-align: center; padding: 40px 20px; color: var(--text3); }
.empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-state .empty-text { font-size: 15px; font-weight: 600; margin-bottom: 6px; color: var(--text2); }
.empty-state .empty-sub { font-size: 13px; }

/* 삭제 버튼 */
.btn-danger { background: rgba(231,76,60,0.15); color: var(--red); border: 1px solid rgba(231,76,60,0.3); border-radius: 10px; padding: 10px 16px; font-size: 14px; font-weight: 600; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; width: 100%; transition: background 0.15s; }
.btn-danger:active { background: rgba(231,76,60,0.25); }

/* 설정 */
.setting-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--border); }
.setting-row:last-child { border-bottom: none; }
.setting-label { font-size: 15px; font-weight: 600; }
.setting-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
</style>
</head>
<body>
<div id="app">
  <!-- ── 홈 ── -->
  <div id="screen-home" class="screen active">
    <div class="page-header">
      <h1>AI 다이어리</h1>
      <div class="subtitle">당신의 영업 성공을 이끌어주는 트래커</div>
    </div>
    <div class="home-greeting">
      <div class="date-line" id="home-date-full"></div>
    </div>

    <div class="section-title">📞 오늘 연락할 고객</div>
    <div id="today-contacts-list" class="today-contacts"></div>

    <div class="card">
      <div class="card-label">오늘 활동 진행률</div>
      <div id="activity-progress-bars"></div>
    </div>

    <div class="card">
      <div class="card-label">파이프라인 현황</div>
      <div id="pipeline-summary" class="pipeline-summary"></div>
    </div>
  </div>

  <!-- ── 고객 ── -->
  <div id="screen-customer" class="screen">
    <div class="page-header">
      <h1>👥 고객 관리</h1>
    </div>
    <div class="customer-search">
      <input type="text" id="customer-search-input" placeholder="고객 이름 검색..." oninput="renderKanban()">
      <button class="add-customer-btn" onclick="openAddCustomer()">+</button>
    </div>
    <div id="kanban-board" class="kanban-wrap"></div>
  </div>

  <!-- ── 활동 ── -->
  <div id="screen-activity" class="screen">
    <div class="page-header">
      <h1>📊 오늘의 활동</h1>
    </div>
    <div class="activity-date" id="activity-date-label"></div>
    <div class="activity-items" id="activity-items-list"></div>
    <div class="activity-memo-section">
      <div class="form-group" style="margin:0 0 12px">
        <label class="form-label">오늘 메모 (선택)</label>
        <textarea id="activity-memo-input" placeholder="오늘 느낀 점, 특이사항, 아이디어..." rows="3" oninput="saveActivityMemo()"></textarea>
      </div>
    </div>
    <button class="journal-btn" onclick="openJournalModal()">
      <span class="journal-btn-icon">💔</span>
      <span class="journal-btn-text">
        <span class="journal-btn-title">거절 회복 저널</span>
        <span class="journal-btn-sub">오늘 거절당했나요? 기록으로 털어내요</span>
      </span>
    </button>
    <div style="height:16px"></div>
    <div style="padding:0 16px"><button class="btn-primary" onclick="saveActivityData()">💾 오늘 기록 저장</button></div>
    <div style="height:16px"></div>
  </div>

  <!-- ── 리뷰 ── -->
  <div id="screen-review" class="screen">
    <div class="page-header">
      <h1>📅 주간 리뷰</h1>
    </div>
    <div class="review-week" id="review-week-label"></div>

    <div class="card" style="margin-top:12px">
      <div class="card-label">이번 주 성과</div>
      <div id="review-stats"></div>
    </div>

    <div class="card">
      <div class="card-label">다음 주 목표 설정</div>
      <div id="goal-inputs"></div>
      <button class="btn-primary" onclick="saveGoals()" style="margin-top:8px">목표 저장</button>
    </div>

<!-- ── 토스트 ── -->
<div id="toast" class="toast"></div>

<script>
// ══════════════════════════════
// 데이터 관리
// ══════════════════════════════
const KEYS = {
  customers: 'diary_customers',
  activities: 'diary_activities',
  goals: 'diary_goals',
  journal: 'diary_journal'
};

function load(key) {
  try { return JSON.parse(localStorage.getItem(key)) || []; } catch { return []; }
}
function loadObj(key, def) {
  try { return JSON.parse(localStorage.getItem(key)) || def; } catch { return def; }
}
function save(key, val) {
  localStorage.setItem(key, JSON.stringify(val));
}

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

// ── 오늘 날짜 유틸 ──
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function formatDate(str) {
  if (!str) return '';
  const [y,m,d] = str.split('-');
  return `${y}년 ${parseInt(m)}월 ${parseInt(d)}일`;
}
function dayDiff(dateStr) {
  if (!dateStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(dateStr); target.setHours(0,0,0,0);
  return Math.round((target - today) / 86400000);
}
function getWeekRange() {
  const now = new Date();
  const day = now.getDay(); // 0=일
  const mon = new Date(now); mon.setDate(now.getDate() - (day === 0 ? 6 : day - 1));
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
  return `${now.getFullYear()}년 ${fmt(mon)} ~ ${fmt(sun)}`;
}
function getWeekStart() {
  const now = new Date();
  const day = now.getDay();
  const mon = new Date(now); mon.setDate(now.getDate() - (day === 0 ? 6 : day - 1)); mon.setHours(0,0,0,0);
  return mon.toISOString().slice(0,10);
}

const WEEK_DAYS = ['일','월','화','수','목','금','토'];
function fullDateStr() {
  const d = new Date();
  const start = new Date(d.getFullYear(), 0, 0);
  const diff = d - start;
  const dayNum = Math.floor(diff / 86400000);
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${WEEK_DAYS[d.getDay()]}) · 올해 ${dayNum}번째 날`;
}

// ══════════════════════════════
// 탭 전환
// ══════════════════════════════
function switchTab(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'home') renderHome();
  if (name === 'customer') renderKanban();
  if (name === 'activity') renderActivity();
  if (name === 'review') renderReview();
}

// ══════════════════════════════
// 홈 화면
// ══════════════════════════════
function renderHome() {
  document.getElementById('home-date-full').textContent = fullDateStr();


  const customers = load(KEYS.customers);
  const today = todayStr();
  const urgent = [];

  customers.forEach(c => {
    if (c.stage === '성사' || c.stage === '휴면') return;
    const diff = dayDiff(c.followUp);
    const bday = c.birthday ? c.birthday.slice(5) : null;
    const todayMD = today.slice(5);
    const isBirthday = bday === todayMD;
    if (isBirthday) urgent.push({ c, type: 'birthday', priority: 0 });
    else if (diff !== null && diff < 0) urgent.push({ c, type: 'urgent', priority: 1 + diff });
    else if (diff !== null && diff === 0) urgent.push({ c, type: 'today', priority: 50 });
  });
  urgent.sort((a, b) => a.priority - b.priority);

  const list = document.getElementById('today-contacts-list');
  if (urgent.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🎉</div><div class="empty-text">오늘 연락할 고객이 없어요!</div><div class="empty-sub">새 고객을 추가하거나 팔로업 날짜를 설정하세요</div></div>`;
  } else {
    list.innerHTML = urgent.slice(0, 5).map(({ c, type }) => {
      let dotClass = type === 'birthday' ? 'urgency-birthday' : type === 'urgent' ? 'urgency-red' : 'urgency-yellow';
      let meta = type === 'birthday' ? '🎂 오늘 생일!' : type === 'urgent' ? `팔로업 ${Math.abs(dayDiff(c.followUp))}일 지남` : '오늘 팔로업 예정';
      let action = type === 'birthday' ? '축하 메시지 ▶' : '연락하기 ▶';
      return `<div class="today-contact-item" onclick="openCustomerDetail('${c.id}')">
        <div class="contact-urgency ${dotClass}"></div>
        <div class="contact-info">
          <div class="contact-name">${c.name}</div>
          <div class="contact-meta">${meta}${c.note ? ' · ' + c.note : ''}</div>
        </div>
        <div class="contact-action">${action}</div>
      </div>`;
    }).join('');
  }

  // 활동 진행률
  const todayActivity = loadObj('diary_act_' + today, {});
  const goals = loadObj(KEYS.goals, { 신규연락:5, 팔로업:10, 미팅:2, 성사:1 });
  const showItems = ['신규연락', '팔로업', '미팅', '성사'];
  const icons = { 신규연락:'📞', 팔로업:'🔄', 미팅:'🤝', 성사:'✅' };
  document.getElementById('activity-progress-bars').innerHTML = showItems.map(item => {
    const done = todayActivity[item] || 0;
    const goal = goals[item] || 1;
    const pct = Math.min(100, Math.round(done / goal * 100));
    return `<div class="progress-row">
      <div class="progress-label">${icons[item]} ${item}</div>
      <div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
      <div class="progress-count">${done}/${goal}</div>
    </div>`;
  }).join('');

  // 파이프라인 요약
  const stages = ['잠재','접촉','미팅','성사','휴면'];
  const counts = {};
  stages.forEach(s => counts[s] = 0);
  customers.forEach(c => { if (counts[c.stage] !== undefined) counts[c.stage]++; });
  const stageColors = { 잠재:'#B2BEC3', 접촉:'#74B9FF', 미팅:'#FDCB6E', 성사:'#55EFC4', 휴면:'#636E72' };
  document.getElementById('pipeline-summary').innerHTML = stages.map(s =>
    `<div class="pipeline-chip"><span class="pcount" style="color:${stageColors[s]}">${counts[s]}</span>${s}</div>`
  ).join('');

  // 긴급 뱃지
  const urgentCount = customers.filter(c => {
    if (c.stage === '성사' || c.stage === '휴면') return false;
    const diff = dayDiff(c.followUp);
    return diff !== null && diff <= 0;
  }).length;
  const badge = document.getElementById('urgent-badge');
  if (urgentCount > 0) { badge.textContent = urgentCount; badge.style.display = 'block'; }
  else badge.style.display = 'none';
}

// ══════════════════════════════
// 고객 칸반
// ══════════════════════════════
function renderKanban() {
  const customers = load(KEYS.customers);
  const search = (document.getElementById('customer-search-input')?.value || '').toLowerCase();
  const filtered = search ? customers.filter(c => c.name.toLowerCase().includes(search)) : customers;
  const stages = ['잠재','접촉','미팅','성사','휴면'];
  const today = todayStr();

  const board = document.getElementById('kanban-board');
  board.innerHTML = stages.map(stage => {
    const cols = filtered.filter(c => c.stage === stage);
    return `<div class="kanban-col col-${stage}">
      <div class="kanban-col-header">
        <span class="kanban-col-title">${stage}</span>
        <span class="kanban-col-count">${cols.length}</span>
      </div>
      <div class="kanban-cards">
        ${cols.length === 0 ? '<div style="color:var(--text3);font-size:12px;padding:8px;text-align:center">없음</div>' :
          cols.map(c => {
            const diff = dayDiff(c.followUp);
            let followHtml = '';
            if (c.followUp) {
              if (diff < 0) followHtml = `<div class="kanban-card-follow follow-urgent">🔴 ${Math.abs(diff)}일 초과</div>`;
              else if (diff === 0) followHtml = `<div class="kanban-card-follow follow-today">🟡 오늘</div>`;
              else followHtml = `<div class="kanban-card-follow follow-ok">D-${diff}</div>`;
            }
            const bday = c.birthday ? c.birthday.slice(5) : null;
            const bdayTag = bday === today.slice(5) ? ' 🎂' : '';
            return `<div class="kanban-card" onclick="openCustomerDetail('${c.id}')">
              <div class="kanban-card-name">${c.name}${bdayTag}</div>
              ${c.note ? `<div class="kanban-card-meta">${c.note.slice(0,18)}</div>` : ''}
              ${followHtml}
            </div>`;
          }).join('')
        }
      </div>
    </div>`;
  }).join('');
}

function openAddCustomer() {
  document.getElementById('modal-customer-title').textContent = '고객 추가';
  document.getElementById('edit-customer-id').value = '';
  document.getElementById('f-name').value = '';
  document.getElementById('f-phone').value = '';
  document.getElementById('f-birthday').value = '';
  document.getElementById('f-stage').value = '잠재';
  document.getElementById('f-followup').value = '';
  document.getElementById('f-note').value = '';
  document.getElementById('delete-customer-wrap').style.display = 'none';
  openModal('modal-customer');
}

function openEditCustomer(id) {
  const customers = load(KEYS.customers);
  const c = customers.find(x => x.id === id);
  if (!c) return;
  document.getElementById('modal-customer-title').textContent = '고객 편집';
  document.getElementById('edit-customer-id').value = c.id;
  document.getElementById('f-name').value = c.name || '';
  document.getElementById('f-phone').value = c.phone || '';
  document.getElementById('f-birthday').value = c.birthday || '';
  document.getElementById('f-stage').value = c.stage || '잠재';
  document.getElementById('f-followup').value = c.followUp || '';
  document.getElementById('f-note').value = c.note || '';
  document.getElementById('delete-customer-wrap').style.display = 'block';
  closeModal('modal-customer-detail');
  openModal('modal-customer');
}

function saveCustomer() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('이름을 입력하세요'); return; }
  const customers = load(KEYS.customers);
  const editId = document.getElementById('edit-customer-id').value;
  const data = {
    id: editId || genId(),
    name,
    phone: document.getElementById('f-phone').value.trim(),
    birthday: document.getElementById('f-birthday').value,
    stage: document.getElementById('f-stage').value,
    followUp: document.getElementById('f-followup').value,
    note: document.getElementById('f-note').value.trim(),
    memos: [],
    createdAt: new Date().toISOString()
  };
  if (editId) {
    const idx = customers.findIndex(x => x.id === editId);
    if (idx >= 0) { data.memos = customers[idx].memos || []; data.createdAt = customers[idx].createdAt; customers[idx] = data; }
  } else {
    customers.push(data);
  }
  save(KEYS.customers, customers);
  closeModal('modal-customer');
  renderKanban();
  renderHome();
  showToast(editId ? '고객 정보 수정됨' : '고객 추가 완료 🎉');
}

function deleteCustomer() {
  const id = document.getElementById('edit-customer-id').value;
  if (!id || !confirm('이 고객을 삭제할까요?')) return;
  const customers = load(KEYS.customers).filter(x => x.id !== id);
  save(KEYS.customers, customers);
  closeModal('modal-customer');
  renderKanban();
  renderHome();
  showToast('고객이 삭제됐어요');
}

function openCustomerDetail(id) {
  const customers = load(KEYS.customers);
  const c = customers.find(x => x.id === id);
  if (!c) return;
  const diff = dayDiff(c.followUp);
  let followText = c.followUp ? formatDate(c.followUp) : '미설정';
  if (c.followUp && diff !== null) {
    if (diff < 0) followText += ` <span class="follow-urgent">(${Math.abs(diff)}일 초과!)</span>`;
    else if (diff === 0) followText += ` <span class="follow-today">(오늘!)</span>`;
    else followText += ` <span class="follow-ok">(D-${diff})</span>`;
  }
  const avatarColors = ['#FF6B35','#3498DB','#27AE60','#9B59B6','#E91E8C','#F39C12'];
  const avatarColor = avatarColors[c.name.charCodeAt(0) % avatarColors.length];
  const memos = c.memos || [];

  document.getElementById('customer-detail-content').innerHTML = `
    <div class="customer-detail-header">
      <div class="customer-avatar" style="background:${avatarColor}">${c.name[0]}</div>
      <div>
        <div class="customer-detail-name">${c.name}</div>
        <div class="customer-detail-sub">${c.phone || '연락처 없음'} · <span class="stage-badge stage-${c.stage}">${c.stage}</span></div>
      </div>
    </div>
    ${c.birthday ? `<div style="font-size:13px;color:var(--text2);margin-bottom:12px">🎂 ${formatDate(c.birthday)}</div>` : ''}
    <div style="background:var(--bg3);border-radius:10px;padding:12px;margin-bottom:16px">
      <div style="font-size:12px;color:var(--text3);margin-bottom:4px">다음 팔로업</div>
      <div style="font-size:15px;font-weight:700">${followText}</div>
    </div>
    ${c.note ? `<div style="font-size:14px;color:var(--text2);margin-bottom:16px">📝 ${c.note}</div>` : ''}
    <div style="font-size:13px;font-weight:700;color:var(--accent);margin-bottom:8px">상담 메모</div>
    <div class="memo-list" id="memo-list-${id}">
      ${memos.length === 0 ? '<div style="color:var(--text3);font-size:13px">메모가 없어요</div>' :
        memos.slice().reverse().map(m => `<div class="memo-item"><div class="memo-date">${m.date}</div><div class="memo-text">${m.text}</div></div>`).join('')}
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <input type="text" id="new-memo-input" placeholder="새 메모 추가..." style="flex:1;padding:10px 12px;font-size:14px">
      <button onclick="addMemo('${id}')" style="background:var(--accent);border:none;border-radius:10px;padding:0 16px;color:white;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer">추가</button>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-secondary" onclick="closeModal('modal-customer-detail')" style="flex:1">닫기</button>
      <button class="btn-primary" onclick="openEditCustomer('${id}')" style="flex:2">편집</button>
    </div>`;
  openModal('modal-customer-detail');
}

function addMemo(id) {
  const input = document.getElementById('new-memo-input');
  const text = input.value.trim();
  if (!text) return;
  const customers = load(KEYS.customers);
  const c = customers.find(x => x.id === id);
  if (!c) return;
  if (!c.memos) c.memos = [];
  c.memos.push({ date: todayStr(), text });
  save(KEYS.customers, customers);
  input.value = '';
  const list = document.getElementById('memo-list-' + id);
  if (list) {
    list.innerHTML = c.memos.slice().reverse().map(m => `<div class="memo-item"><div class="memo-date">${m.date}</div><div class="memo-text">${m.text}</div></div>`).join('');
  }
  showToast('메모 저장됨');
}

// ══════════════════════════════
// 활동 트래커
// ══════════════════════════════
const ACTIVITY_ITEMS = [
  { key: '신규연락', icon: '📞', label: '신규 연락' },
  { key: '팔로업', icon: '🔄', label: '팔로업 연락' },
  { key: '미팅', icon: '🤝', label: '미팅' },
  { key: '성사', icon: '✅', label: '성사' },
  { key: 'SNS', icon: '📱', label: 'SNS 활동' },
  { key: '샘플제공', icon: '🎁', label: '샘플 제공' },
  { key: '제품배송', icon: '📦', label: '제품 배송' },
];

function renderActivity() {
  const today = todayStr();
  document.getElementById('activity-date-label').textContent = formatDate(today) + ' 기록';
  const data = loadObj('diary_act_' + today, {});
  document.getElementById('activity-items-list').innerHTML = ACTIVITY_ITEMS.map(item => `
    <div class="activity-item">
      <div class="activity-icon">${item.icon}</div>
      <div class="activity-name">${item.label}</div>
      <div class="activity-counter">
        <button class="counter-btn minus" onclick="changeActivity('${item.key}',-1)">−</button>
        <div class="counter-num" id="act-num-${item.key}">${data[item.key] || 0}</div>
        <button class="counter-btn plus" onclick="changeActivity('${item.key}',1)">+</button>
      </div>
    </div>`).join('');
  const memo = loadObj('diary_act_memo_' + today, '');
  document.getElementById('activity-memo-input').value = memo;
}

function changeActivity(key, delta) {
  const today = todayStr();
  const data = loadObj('diary_act_' + today, {});
  data[key] = Math.max(0, (data[key] || 0) + delta);
  save('diary_act_' + today, data);
  const el = document.getElementById('act-num-' + key);
  if (el) el.textContent = data[key];
}

function saveActivityMemo() {
  const today = todayStr();
  save('diary_act_memo_' + today, document.getElementById('activity-memo-input').value);
}

function saveActivityData() {
  const today = todayStr();
  const data = loadObj('diary_act_' + today, {});
  const activities = load(KEYS.activities).filter(a => a.date !== today);
  activities.push({ date: today, ...data });
  save(KEYS.activities, activities);
  showToast('오늘 기록 저장됨 💾');
}

// ══════════════════════════════
// 주간 리뷰
// ══════════════════════════════
function renderReview() {
  document.getElementById('review-week-label').textContent = getWeekRange();
  const weekStart = getWeekStart();
  const activities = load(KEYS.activities);
  const goals = loadObj(KEYS.goals, { 신규연락:10, 팔로업:15, 미팅:5, 성사:2 });
  const weekStart_d = new Date(weekStart);

  const totals = { 신규연락:0, 팔로업:0, 미팅:0, 성사:0 };
  activities.forEach(a => {
    const d = new Date(a.date);
    if (d >= weekStart_d) {
      Object.keys(totals).forEach(k => { totals[k] += (a[k] || 0); });
    }
  });

  const icons = { 신규연락:'📞', 팔로업:'🔄', 미팅:'🤝', 성사:'✅' };
  document.getElementById('review-stats').innerHTML = Object.keys(totals).map(key => {
    const done = totals[key]; const goal = goals[key] || 1;
    const pct = Math.min(100, Math.round(done/goal*100));
    let resultClass = done >= goal ? 'result-over' : done >= goal * 0.7 ? 'result-ok' : 'result-miss';
    let resultText = done >= goal ? '✅달성' : done >= goal*0.7 ? '⚠️근접' : '❌미달';
    return `<div class="review-stat">
      <div class="review-stat-name">${icons[key]} ${key}</div>
      <div class="review-stat-bar">
        <div style="height:6px;background:var(--bg3);border-radius:3px;overflow:hidden">
          <div style="width:${pct}%;height:100%;background:var(--accent);border-radius:3px"></div>
        </div>
        <div class="review-stat-goal">목표 ${goal}회</div>
      </div>
      <div class="review-stat-count">${done}</div>
      <div class="review-result ${resultClass}">${resultText}</div>
    </div>`;
  }).join('');

  // 목표 설정
  document.getElementById('goal-inputs').innerHTML = Object.keys(totals).map(key =>
    `<div class="goal-input-row">
      <div class="goal-input-label">${icons[key]} ${key}</div>
      <input type="number" class="goal-input" id="goal-${key}" value="${goals[key] || 0}" min="0">
    </div>`
  ).join('');

  // 우선 고객 추천
  const customers = load(KEYS.customers).filter(c => c.stage !== '성사' && c.stage !== '휴면');
  const scored = customers.map(c => {
    let score = 0;
    const diff = dayDiff(c.followUp);
    if (diff !== null) score += diff < 0 ? 100 + Math.abs(diff)*10 : diff === 0 ? 80 : 0;
    const bday = c.birthday ? c.birthday.slice(5) : null;
    const todayMD = todayStr().slice(5);
    if (bday === todayMD) score += 200;
    return { c, score };
  }).filter(x => x.score > 0).sort((a,b) => b.score - a.score).slice(0,5);

  const recEl = document.getElementById('recommended-customers');
  if (scored.length === 0) {
    recEl.innerHTML = `<div class="empty-state"><div class="empty-icon">🎉</div><div class="empty-text">우선 연락 고객이 없어요!</div></div>`;
  } else {
    recEl.innerHTML = scored.map(({c,score}, i) => {
      const diff = dayDiff(c.followUp);
      const reason = diff !== null && diff < 0 ? `팔로업 ${Math.abs(diff)}일 지남` : diff === 0 ? '오늘 팔로업' : `팔로업 D-${diff}`;
      return `<div class="rec-customer" onclick="openCustomerDetail('${c.id}')">
        <div class="rec-rank">${i+1}</div>
        <div class="rec-info"><div class="rec-name">${c.name}</div><div class="rec-reason">${reason}</div></div>
        <span class="stage-badge stage-${c.stage}">${c.stage}</span>
      </div>`;
    }).join('');
  }
}

function saveGoals() {
  const keys = ['신규연락','팔로업','미팅','성사'];
  const goals = {};
  keys.forEach(k => { const el = document.getElementById('goal-' + k); if (el) goals[k] = parseInt(el.value) || 0; });
  save(KEYS.goals, goals);
  showToast('목표 저장됨 🎯');
  renderHome();
}

// ══════════════════════════════
// 거절 저널
// ══════════════════════════════
let selectedSituation = '';
function openJournalModal() {
  document.getElementById('j-customer').value = '';
  document.getElementById('j-feeling').value = '';
  document.getElementById('j-next').value = '';
  selectedSituation = '';
  document.querySelectorAll('.situation-chip').forEach(c => c.classList.remove('selected'));
  openModal('modal-journal');
}
function selectSituation(el, val) {
  document.querySelectorAll('.situation-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedSituation = val;
}
function saveJournal() {
  const journals = load(KEYS.journal);
  journals.push({
    id: genId(),
    date: todayStr(),
    customer: document.getElementById('j-customer').value.trim(),
    situation: selectedSituation,
    feeling: document.getElementById('j-feeling').value.trim(),
    next: document.getElementById('j-next').value.trim(),
  });
  save(KEYS.journal, journals);
  closeModal('modal-journal');
  showToast('기록됨 💪 오늘도 수고했어요!');
}

// ══════════════════════════════
// 모달 유틸
// ══════════════════════════════
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function closeModalIf(e, id) { if (e.target.id === id) closeModal(id); }

// ══════════════════════════════
// 토스트
// ══════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ══════════════════════════════
// 초기화
// ══════════════════════════════
renderHome();

// 서비스워커 등록
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
