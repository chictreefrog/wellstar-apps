<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0D0D1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>AI 콘텐츠 생성기 — AI 세일즈 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0D0D1A;--card:rgba(18,18,42,0.9);--text:#F5F5F7;--text2:rgba(255,255,255,0.6);--text3:rgba(255,255,255,0.35);--accent:#FF6B35;--accent2:#FF8F65;--green:#30D158;--border:rgba(255,255,255,0.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',-apple-system,sans-serif;min-height:100vh}
.app{max-width:420px;margin:0 auto;padding:20px;min-height:100vh}
.header{text-align:center;margin-bottom:24px}
.header-icon{font-size:40px;margin-bottom:8px}
.header-title{font-size:22px;font-weight:900}
.header-sub{font-size:13px;color:var(--text2);margin-top:4px}

.section{margin-bottom:18px}
.section-title{font-size:14px;font-weight:700;margin-bottom:10px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);font-size:13px;cursor:pointer;transition:all .2s;color:var(--text2)}
.chip.active{border-color:var(--accent);background:rgba(255,107,53,0.12);color:var(--accent);font-weight:600}

.form-input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,0.05);color:var(--text);font-size:14px;font-family:inherit;outline:none;margin-bottom:10px}
.form-input:focus{border-color:var(--accent)}
textarea.form-input{min-height:80px;resize:vertical}

.btn{display:block;width:100%;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white}
.btn-primary:disabled{opacity:0.5}

.result-card{display:none;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:14px}
.result-label{font-size:12px;color:var(--accent);font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.result-text{font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.result-tags{margin-top:10px;font-size:13px;color:var(--blue,#0A84FF)}
.result-actions{display:flex;gap:8px;margin-top:12px}
.result-action{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;text-align:center}
.result-action:active{background:rgba(255,255,255,0.05)}

.loading{display:none;text-align:center;padding:30px}
.loading-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--text2)}

.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(30,30,60,0.95);color:white;padding:10px 20px;border-radius:12px;font-size:13px;z-index:9999;display:none;backdrop-filter:blur(10px)}
.credit{text-align:center;font-size:11px;color:var(--text3);margin-top:24px;padding-bottom:20px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-icon">✍️</div>
    <div class="header-title">AI 콘텐츠 생성기</div>
    <div class="header-sub">SNS 게시물을 AI가 자동으로 만들어줘요</div>
  </div>

  <div class="section">
    <div class="section-title">📱 채널 선택</div>
    <div class="chips" id="channelChips">

    </div>
  </div>

  <div class="section">
    <div class="section-title">📌 콘텐츠 유형</div>
    <div class="chips" id="typeChips">

      <div class="chip" data-v="review">제품 후기</div>
      <div class="chip" data-v="tip">영업 팁</div>
      <div class="chip" data-v="story">성공 스토리</div>

      <div class="chip" data-v="recruit">사업 소개</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">✏️ 키워드 / 주제 <span style="font-size:11px;color:var(--text3);font-weight:400">(선택)</span></div>
    <input class="form-input" id="keyword" placeholder="예: 아침 루틴, 첫 계약 성공, 건강보조식품 효과">
  </div>

  <div class="section">
    <div class="section-title">🎭 톤</div>
    <div class="chips" id="toneChips">
      <div class="chip active" data-v="friendly">친근하게</div>
      <div class="chip" data-v="professional">전문적으로</div>
      <div class="chip" data-v="emotional">감성적으로</div>
      <div class="chip" data-v="witty">재치있게</div>
    </div>
  </div>

  <button class="btn btn-primary" id="genBtn" onclick="generate()">콘텐츠 생성하기</button>

  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">AI가 콘텐츠를 작성하고 있어요...</div>
  </div>

  <!-- Caption -->
  <div class="result-card" id="captionCard">
    <div class="result-label">📝 본문</div>
    <div class="result-text" id="captionText"></div>
    <div class="result-actions">
      <button class="result-action" onclick="copy('captionText')">📋 복사</button>
      <button class="result-action" onclick="generate()">🔄 다시</button>
    </div>
  </div>

  <!-- Hashtags -->
  <div class="result-card" id="hashCard">
    <div class="result-label">🏷 해시태그</div>
    <div class="result-text" id="hashText"></div>
    <div class="result-actions">
      <button class="result-action" onclick="copy('hashText')">📋 복사</button>
    </div>
  </div>

  <!-- Hook -->
  <div class="result-card" id="hookCard">
    <div class="result-label">🪝 첫 줄 (후킹)</div>
    <div class="result-text" id="hookText"></div>
    <div class="result-actions">
      <button class="result-action" onclick="copy('hookText')">📋 복사</button>
    </div>
  </div>

  <div class="credit">by 옆집디노 · <a href="/main/" style="color:var(--accent);text-decoration:none">AI 세일즈 시스템</a></div>
</div>
<div class="toast" id="toast"></div>

<script>
document.querySelectorAll('.chips').forEach(g => {
  g.addEventListener('click', e => {
    const c = e.target.closest('.chip');
    if (!c) return;
    g.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
  });
});
function sel(id) { return document.querySelector(`#${id} .chip.active`)?.dataset.v || ''; }

function generate() {
  const channel = sel('channelChips');
  const type = sel('typeChips');
  const tone = sel('toneChips');
  const keyword = document.getElementById('keyword').value.trim() || '나의 도전';

  const db = CONTENT_DB[type]?.[tone];
  if (!db) { showToast('다른 조합을 선택해주세요'); return; }

  document.getElementById('genBtn').disabled = true;
  document.getElementById('loading').style.display = 'block';
  document.querySelectorAll('.result-card').forEach(c => c.style.display = 'none');

  setTimeout(() => {
    const idx = Math.floor(Math.random() * db.captions.length);
    const caption = db.captions[idx].replace(/\{keyword\}/g, keyword);
    const hook = db.hooks[Math.floor(Math.random() * db.hooks.length)];
    const tags = HASHTAGS[channel]?.[type] || '';

    document.getElementById('captionText').textContent = caption;
    document.getElementById('hashText').textContent = tags;
    document.getElementById('hookText').textContent = hook;

    document.getElementById('loading').style.display = 'none';
    document.getElementById('captionCard').style.display = 'block';
    document.getElementById('hashCard').style.display = 'block';
    document.getElementById('hookCard').style.display = 'block';
    document.getElementById('genBtn').disabled = false;

    document.getElementById('captionCard').scrollIntoView({ behavior: 'smooth' });
  }, 1200);
}

function copy(id) {
  navigator.clipboard.writeText(document.getElementById(id).textContent)
    .then(() => showToast('복사되었어요 📋'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}
