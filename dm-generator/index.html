<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0D0D1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>DM 메시지 생성기 — AI 세일즈 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0D0D1A;--card:rgba(18,18,42,0.9);--text:#F5F5F7;--text2:rgba(255,255,255,0.6);--text3:rgba(255,255,255,0.35);--accent:#FF6B35;--accent2:#FF8F65;--green:#30D158;--border:rgba(255,255,255,0.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',-apple-system,sans-serif;min-height:100vh}
.app{max-width:420px;margin:0 auto;padding:20px;min-height:100vh}
.header{text-align:center;margin-bottom:24px}
.header-icon{font-size:40px;margin-bottom:8px}
.header-title{font-size:22px;font-weight:900}
.header-sub{font-size:13px;color:var(--text2);margin-top:4px}

.section{margin-bottom:20px}
.section-title{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}

/* Chips */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);font-size:13px;cursor:pointer;transition:all .2s;color:var(--text2)}
.chip.active{border-color:var(--accent);background:rgba(255,107,53,0.12);color:var(--accent);font-weight:600}

/* Form */
.form-input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,0.05);color:var(--text);font-size:14px;font-family:inherit;outline:none;margin-bottom:10px}
.form-input:focus{border-color:var(--accent)}
textarea.form-input{min-height:70px;resize:vertical}
.form-hint{font-size:11px;color:var(--text3);margin-top:-6px;margin-bottom:10px}

.btn{display:block;width:100%;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2);margin-top:8px}

/* Result */
.result-box{display:none;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px}
.result-label{font-size:12px;color:var(--accent);font-weight:600;margin-bottom:8px}
.result-text{font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.result-actions{display:flex;gap:8px;margin-top:14px}
.result-action{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;text-align:center}
.result-action:active{background:rgba(255,255,255,0.05)}

/* Templates */
.template-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all .2s}
.template-card:active{transform:scale(0.98)}
.template-name{font-size:14px;font-weight:600;margin-bottom:2px}
.template-preview{font-size:12px;color:var(--text3);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(30,30,60,0.95);color:white;padding:10px 20px;border-radius:12px;font-size:13px;z-index:9999;display:none;backdrop-filter:blur(10px)}

.tabs{display:flex;gap:4px;background:rgba(255,255,255,0.05);border-radius:12px;padding:3px;margin-bottom:20px}
.tab{flex:1;padding:10px;text-align:center;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text3);transition:all .2s}
.tab.active{background:var(--accent);color:white}

.credit{text-align:center;font-size:11px;color:var(--text3);margin-top:24px;padding-bottom:20px}
</style>
</head>
<body>
<div class="app">
  <a href="/main/" style="display:inline-block;font-size:14px;color:rgba(255,255,255,0.5);text-decoration:none;margin-bottom:8px">← 홈</a>
  <div class="header">
    <div class="header-icon">💬</div>
    <div class="header-title">DM 메시지 생성기</div>
    <div class="header-sub">상황에 맞는 완벽한 메시지를 AI가 만들어줘요</div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchMode('ai')">AI 생성</div>
    <div class="tab" onclick="switchMode('templates')">템플릿</div>
  </div>

  <!-- AI Generation Mode -->
  <div id="modeAI">
    <div class="section">
      <div class="section-title">📌 메시지 목적</div>
      <div class="chips" id="purposeChips">
        <div class="chip active" data-v="first-contact">첫 연락</div>
        <div class="chip" data-v="followup">팔로업</div>
        <div class="chip" data-v="invitation">사업 초대</div>
        <div class="chip" data-v="product">제품 소개</div>
        <div class="chip" data-v="recontact">재연락</div>
        <div class="chip" data-v="congrats">축하/안부</div>
        <div class="chip" data-v="objection">반론 대응</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">🎭 톤 & 스타일</div>
      <div class="chips" id="toneChips">
        <div class="chip active" data-v="casual">친근하게</div>
        <div class="chip" data-v="professional">전문적으로</div>
        <div class="chip" data-v="warm">따뜻하게</div>
        <div class="chip" data-v="energetic">에너지 넘치게</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">📝 상황 설명 <span style="font-size:11px;color:var(--text3);font-weight:400">(선택)</span></div>
      <textarea class="form-input" id="context" placeholder="예: 인스타에서 알게 된 30대 여성, 육아맘, 건강에 관심 많음"></textarea>
      <div class="form-hint">상대방 정보를 넣으면 더 맞춤형 메시지가 생성돼요</div>
    </div>

    <div class="section">
      <div class="section-title">📱 채널</div>
      <div class="chips" id="channelChips">
        <div class="chip active" data-v="kakao">카카오톡</div>
        <div class="chip" data-v="instagram">인스타 DM</div>
        <div class="chip" data-v="sms">문자</div>
      </div>
    </div>

    <button class="btn btn-primary" id="generateBtn" onclick="generateMessage()">메시지 생성하기</button>

    <div class="result-box" id="resultBox">
      <div class="result-label">생성된 메시지</div>
      <div class="result-text" id="resultText"></div>
      <div class="result-actions">
        <button class="result-action" onclick="copyResult()">📋 복사</button>
        <button class="result-action" onclick="regenerate()">🔄 다시 생성</button>
      </div>
    </div>

    <div class="result-box" id="altBox" style="display:none">
      <div class="result-label">대안 메시지</div>
      <div class="result-text" id="altText"></div>
      <div class="result-actions">
        <button class="result-action" onclick="copyAlt()">📋 복사</button>
      </div>
    </div>
  </div>

  <!-- Templates Mode -->
  <div id="modeTemplates" style="display:none">
    <div class="section">
      <div class="section-title">📋 바로 쓸 수 있는 템플릿</div>
      <div id="templateList"></div>
    </div>
  </div>

  <div class="credit">by 옆집디노 · <a href="/main/" style="color:var(--accent);text-decoration:none">AI 세일즈 시스템</a></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══ CHIP SELECTION ═══
document.querySelectorAll('.chips').forEach(group => {
  group.addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    group.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
  });
});

function getSelected(containerId) {
  return document.querySelector(`#${containerId} .chip.active`)?.dataset.v || '';
}

// ═══ TABS ═══
function switchMode(mode) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('modeAI').style.display = mode === 'ai' ? 'block' : 'none';
  document.getElementById('modeTemplates').style.display = mode === 'templates' ? 'block' : 'none';
  if (mode === 'templates') renderTemplates();
}

  {name:'거절 후 우아한 대응',purpose:'objection',msg:'네, 충분히 이해해요 😊 전혀 부담 갖지 마세요. 혹시 나중에라도 궁금한 점 있으시면 언제든 편하게 연락 주세요. 좋은 하루 보내세요!'},
  {name:'팔로업 (관심 표현한 사람)',purpose:'followup',msg:'안녕하세요! 지난번에 관심 보여주셔서 감사해요 😊 혹시 더 자세히 알아보고 싶으시면 간단한 자료 보내드릴까요? 편하실 때 말씀해주세요!'},
];

function renderTemplates() {
  document.getElementById('templateList').innerHTML = TEMPLATES.map((t, i) => `
    <div class="template-card" onclick="useTemplate(${i})">
      <div class="template-name">${t.name}</div>
      <div class="template-preview">${t.msg}</div>
    </div>
  `).join('');
}

function useTemplate(idx) {
  const t = TEMPLATES[idx];
  document.getElementById('resultText').textContent = t.msg;
  document.getElementById('resultBox').style.display = 'block';
  document.getElementById('altBox').style.display = 'none';
  switchMode('ai');
  document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
  document.querySelector('.tab').classList.add('active');
  showToast('템플릿이 적용되었어요');
}

function generateMessage() {
  const purpose = getSelected('purposeChips');
  const tone = getSelected('toneChips');
  const channel = getSelected('channelChips');
  const context = document.getElementById('context').value.trim();

  const msgs = MSG_DB[purpose]?.[tone];
  if (!msgs || !msgs.length) {
    showToast('다른 조합을 선택해주세요');
    return;
  }

  const contextText = context || '관심사';
  const idx = Math.floor(Math.random() * msgs.length);
  let mainMsg = msgs[idx].replace(/\{context\}/g, contextText);
  let altIdx = (idx + 1) % msgs.length;
  let altMsg = msgs[altIdx].replace(/\{context\}/g, contextText);

  // Channel adjustments
  if (channel === 'sms') {
    mainMsg = mainMsg.replace(/😊|💛|✨|🔥|😆|😄|🎉|ㅎㅎ|ㅋㅋ/g, '').replace(/\s{2,}/g, ' ').trim();
  }

  document.getElementById('resultText').textContent = mainMsg;
  document.getElementById('resultBox').style.display = 'block';

  if (altMsg !== mainMsg) {
    document.getElementById('altText').textContent = altMsg;
    document.getElementById('altBox').style.display = 'block';
  }

  document.getElementById('resultBox').scrollIntoView({ behavior: 'smooth' });
}

function regenerate() {
  generateMessage();
}

function copyResult() {
  navigator.clipboard.writeText(document.getElementById('resultText').textContent)
    .then(() => showToast('메시지가 복사되었어요 📋'));
}

function copyAlt() {
  navigator.clipboard.writeText(document.getElementById('altText').textContent)
    .then(() => showToast('메시지가 복사되었어요 📋'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

renderTemplates();
