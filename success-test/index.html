<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0D0D1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>NM 성공 확률 진단기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root { --bg:#0D0D1A; --card:rgba(18,18,42,0.9); --text:#F5F5F7; --text2:rgba(255,255,255,0.6); --text3:rgba(255,255,255,0.35); --accent:#FF6B35; --accent2:#FF8F65; --green:#30D158; --border:rgba(255,255,255,0.08); }
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',-apple-system,sans-serif;min-height:100vh;overflow-x:hidden}
.app{max-width:420px;margin:0 auto;padding:20px;min-height:100vh;display:flex;flex-direction:column}

/* Start screen */
.start{text-align:center;flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px}
.start-icon{font-size:80px;margin-bottom:16px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.start-title{font-size:26px;font-weight:900;margin-bottom:8px;background:linear-gradient(135deg,#FF6B35,#FFD700);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.start-sub{font-size:14px;color:var(--text2);margin-bottom:32px;line-height:1.6}
.start-stats{display:flex;gap:20px;margin-bottom:32px}
.start-stat{text-align:center}
.start-stat-val{font-size:20px;font-weight:900;color:var(--accent)}
.start-stat-label{font-size:11px;color:var(--text3)}

/* Question */
.question-wrap{display:none;flex:1;flex-direction:column}
.progress{height:3px;background:rgba(255,255,255,0.08);border-radius:2px;margin-bottom:24px}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),#FFD700);border-radius:2px;transition:width .4s}
.q-num{font-size:12px;color:var(--accent);font-weight:700;margin-bottom:8px}
.q-text{font-size:18px;font-weight:700;line-height:1.5;margin-bottom:24px}
.q-options{display:flex;flex-direction:column;gap:10px}
.q-opt{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;cursor:pointer;font-size:14px;color:var(--text);transition:all .2s;text-align:left}
.q-opt:active{transform:scale(0.98)}
.q-opt.selected{border-color:var(--accent);background:rgba(255,107,53,0.1)}

/* Result */
.result-wrap{display:none;text-align:center;padding:20px 0}
.result-score{position:relative;width:180px;height:180px;margin:0 auto 20px}
.result-circle{width:100%;height:100%}
.result-pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.result-pct-num{font-size:48px;font-weight:900;font-family:'Bebas Neue',sans-serif}
.result-pct-label{font-size:13px;color:var(--text2)}
.result-grade{font-size:22px;font-weight:900;margin-bottom:4px}
.result-tagline{font-size:14px;color:var(--text2);margin-bottom:20px}
.result-details{text-align:left;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px}
.result-detail-title{font-size:14px;font-weight:700;margin-bottom:10px}
.result-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.result-bar-label{font-size:12px;color:var(--text2);width:70px;flex-shrink:0}
.result-bar-bg{flex:1;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
.result-bar-fill{height:100%;border-radius:3px;transition:width 1s}
.result-bar-val{font-size:12px;font-weight:700;width:30px;text-align:right;flex-shrink:0}

.email-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px;text-align:center}
.email-box-title{font-size:15px;font-weight:700;margin-bottom:4px}
.email-box-sub{font-size:12px;color:var(--text3);margin-bottom:12px}
.email-row{display:flex;gap:8px}
.email-input{flex:1;padding:12px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,0.05);color:var(--text);font-size:14px;outline:none;font-family:inherit}
.email-input:focus{border-color:var(--accent)}
.email-btn{padding:12px 20px;border-radius:10px;border:none;background:var(--accent);color:white;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;white-space:nowrap}

.btn{display:block;width:100%;padding:14px;border-radius:14px;border:none;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:10px}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}
.tip-card{background:rgba(255,107,53,0.08);border:1px solid rgba(255,107,53,0.2);border-radius:14px;padding:16px;margin-bottom:16px;text-align:left}
.tip-card-title{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:6px}
.tip-card-text{font-size:13px;color:var(--text2);line-height:1.6}
</style>
</head>
<body>
<div class="app">
  <!-- START -->
  <div class="start" id="startScreen">
    <div class="start-icon">🎯</div>
    <div class="start-title">NM 성공 확률 진단기</div>
    <div class="start-sub">8가지 핵심 역량을 분석하여<br>당신의 네트워크마케팅 성공 가능성을 진단합니다</div>
    <div class="start-stats">
      <div class="start-stat"><div class="start-stat-val">12</div><div class="start-stat-label">질문</div></div>
      <div class="start-stat"><div class="start-stat-val">2분</div><div class="start-stat-label">소요시간</div></div>
      <div class="start-stat"><div class="start-stat-val">8가지</div><div class="start-stat-label">역량 분석</div></div>
    </div>
    <button class="btn btn-primary" onclick="startTest()">무료 진단 시작</button>
    <div style="font-size:11px;color:var(--text3);margin-top:12px">by 옆집디노 · AI 세일즈 시스템</div>
  </div>

  <!-- QUESTIONS -->
  <div class="question-wrap" id="questionWrap">
    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    <div class="q-num" id="qNum"></div>
    <div class="q-text" id="qText"></div>
    <div class="q-options" id="qOptions"></div>
  </div>

  <!-- RESULT -->
  <div class="result-wrap" id="resultWrap">
    <div class="result-score">
      <svg class="result-circle" viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="52" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="8"/>
        <circle id="scoreCircle" cx="60" cy="60" r="52" fill="none" stroke="url(#grad)" stroke-width="8" stroke-linecap="round"
          stroke-dasharray="327" stroke-dashoffset="327" transform="rotate(-90 60 60)" style="transition:stroke-dashoffset 1.5s ease"/>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%"><stop offset="0%" stop-color="#FF6B35"/><stop offset="100%" stop-color="#FFD700"/></linearGradient></defs>
      </svg>
      <div class="result-pct"><div class="result-pct-num" id="pctNum">0</div><div class="result-pct-label">성공 확률</div></div>
    </div>
    <div class="result-grade" id="resultGrade"></div>
    <div class="result-tagline" id="resultTagline"></div>

    <div class="result-details">
      <div class="result-detail-title">📊 8가지 역량 분석</div>
      <div id="resultBars"></div>
    </div>

    <div class="tip-card">
      <div class="tip-card-title">💡 AI 코치의 한마디</div>
      <div class="tip-card-text" id="aiTip"></div>
    </div>

    <div class="email-box" id="emailSection">
      <div class="email-box-title">📩 상세 분석 리포트 받기</div>
      <div class="email-box-sub">역량별 맞춤 성장 전략을 이메일로 보내드려요</div>
      <div class="email-row">
        <input class="email-input" type="email" id="resultEmail" placeholder="이메일 주소">
        <button class="email-btn" onclick="submitEmail()">받기</button>
      </div>
    </div>

    <button class="btn btn-primary" onclick="shareResult()">결과 공유하기</button>
    <button class="btn btn-ghost" onclick="location.href='/main/'">다른 도구 보기</button>
  </div>
</div>

<script src="/shared/supabase.js"></script>
<script>
const DIMS = ['action','mindset','communication','resilience','leadership','learning','planning','networking'];
const DIM_NAMES = {action:'실행력',mindset:'마인드셋',communication:'소통력',resilience:'회복탄력성',leadership:'리더십',learning:'학습력',planning:'전략/계획',networking:'네트워킹'};
const DIM_COLORS = {action:'#FF6B35',mindset:'#FFD700',communication:'#0A84FF',resilience:'#30D158',leadership:'#BF5AF2',learning:'#FF375F',planning:'#64B4FF',networking:'#FF9F0A'};

const QUESTIONS = [
  {q:'새로운 사람을 만나는 것에 대해 어떻게 느끼나요?',d:'networking',opts:['매우 즐긴다, 에너지를 얻는다','괜찮다, 필요하면 한다','살짝 부담이지만 노력한다','많이 힘들다, 피하고 싶다']},
  {q:'거절당했을 때 보통 어떻게 반응하나요?',d:'resilience',opts:['빠르게 털고 다음으로 넘어간다','좀 속상하지만 곧 회복한다','하루 정도 영향을 받는다','오래 마음에 남고 두렵다']},
  {q:'매일 정해진 루틴을 꾸준히 지키는 편인가요?',d:'planning',opts:['매우 철저히 지킨다','대체로 지키려 노력한다','자주 빠지지만 중요성은 안다','루틴 없이 즉흥적으로 산다']},
  {q:'새로운 기술이나 트렌드를 학습하는 태도는?',d:'learning',opts:['항상 먼저 찾아서 배운다','필요하면 배운다','누가 알려주면 따라한다','변화가 불편하다']},
  {q:'다른 사람에게 무언가를 설명할 때 자신 있는 편인가요?',d:'communication',opts:['매우 자신 있다, 상대가 잘 이해한다','보통이다, 노력하면 된다','좀 부족하다고 느낀다','많이 어렵다']},
  {q:'목표를 세우면 끝까지 해내는 편인가요?',d:'action',opts:['거의 항상 해낸다','70~80%는 달성한다','시작은 하지만 흐지부지 된다','목표 자체를 잘 안 세운다']},
  {q:'어려운 상황에서 "나는 할 수 있다"고 믿는 편인가요?',d:'mindset',opts:['강하게 믿는다','대체로 긍정적이다','반반이다','부정적인 생각이 먼저 든다']},
  {q:'팀원이나 후배를 이끌어본 경험이 있나요?',d:'leadership',opts:['리더 역할을 자주 맡았다','몇 번 해봤고 괜찮았다','경험은 적지만 관심 있다','리더 역할은 부담스럽다']},
  {q:'SNS나 온라인에서 자신을 표현하는 것은?',d:'networking',opts:['적극적으로 콘텐츠를 만든다','가끔 올리는 편이다','보는 것 위주다','거의 안 한다']},
  {q:'수입이 불안정한 초기 기간을 견딜 수 있나요?',d:'resilience',opts:['6개월 이상 가능하다','3~6개월 정도는 된다','1~3개월이 한계다','수입 없는 건 못 견딘다']},
  {q:'하루에 새로운 사람 5명에게 연락하는 것은?',d:'action',opts:['충분히 할 수 있다','노력하면 가능하다','좀 부담이 된다','상상도 못 한다']},
  {q:'1년 후 나의 모습을 선명하게 그릴 수 있나요?',d:'mindset',opts:['매우 선명하게 그려진다','대략적으로 있다','막연하다','생각해본 적 없다']}
];

let currentQ = 0;
const answers = [];

function startTest() {
  try { const l=JSON.parse(localStorage.getItem('dino_activity_log')||'[]'); l.unshift({app:'success-test',label:'NM 성공 확률 진단 시작',ts:Date.now()}); localStorage.setItem('dino_activity_log',JSON.stringify(l.slice(0,50))); } catch{}
  document.getElementById('startScreen').style.display = 'none';
  const wrap = document.getElementById('questionWrap');
  wrap.style.display = 'flex';
  showQuestion(0);
}

function showQuestion(idx) {
  currentQ = idx;
  const q = QUESTIONS[idx];
  document.getElementById('progressBar').style.width = ((idx + 1) / QUESTIONS.length * 100) + '%';
  document.getElementById('qNum').textContent = `Q${idx + 1} / ${QUESTIONS.length}`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('qOptions').innerHTML = q.opts.map((o, i) =>
    `<div class="q-opt" onclick="selectAnswer(${i})">${o}</div>`
  ).join('');
}

function selectAnswer(optIdx) {
  answers[currentQ] = optIdx;
  document.querySelectorAll('.q-opt').forEach((o, i) => o.classList.toggle('selected', i === optIdx));
  setTimeout(() => {
    if (currentQ < QUESTIONS.length - 1) {
      showQuestion(currentQ + 1);
    } else {
      showResult();
    }
  }, 300);
}

function showResult() {
  document.getElementById('questionWrap').style.display = 'none';
  document.getElementById('resultWrap').style.display = 'block';

  // Calculate dimension scores (0~100)
  const dimScores = {};
  DIMS.forEach(d => dimScores[d] = []);
  QUESTIONS.forEach((q, i) => {
    const score = [100, 75, 45, 20][answers[i] || 0];
    dimScores[q.d].push(score);
  });
  const finalScores = {};
  DIMS.forEach(d => {
    const arr = dimScores[d];
    finalScores[d] = arr.length ? Math.round(arr.reduce((a, b) => a + b, 0) / arr.length) : 50;
  });

  // Overall score (weighted)
  const weights = {action:1.3,mindset:1.2,resilience:1.2,communication:1.0,networking:1.0,leadership:0.8,planning:0.9,learning:0.8};
  let totalW = 0, totalS = 0;
  DIMS.forEach(d => { totalW += weights[d]; totalS += finalScores[d] * weights[d]; });
  const overall = Math.round(totalS / totalW);

  // Animate circle
  const offset = 327 - (327 * overall / 100);
  setTimeout(() => {
    document.getElementById('scoreCircle').style.strokeDashoffset = offset;
  }, 100);

  // Animate number
  let cur = 0;
  const interval = setInterval(() => {
    cur += 2;
    if (cur >= overall) { cur = overall; clearInterval(interval); }
    document.getElementById('pctNum').textContent = cur + '%';
  }, 20);

  // Grade
  const grades = [
    {min:80,grade:'S급 잠재력',tag:'이미 성공의 DNA를 가지고 있어요!',color:'#FFD700'},
    {min:65,grade:'A급 잠재력',tag:'조금만 다듬으면 빛날 다이아몬드!',color:'#FF6B35'},
    {min:50,grade:'B급 잠재력',tag:'성장 가능성이 충분합니다!',color:'#0A84FF'},
    {min:35,grade:'C급 잠재력',tag:'AI 코치와 함께 성장하세요',color:'#BF5AF2'},
    {min:0,grade:'D급 잠재력',tag:'지금이 시작할 때입니다!',color:'#FF375F'}
  ];
  const grade = grades.find(g => overall >= g.min);
  document.getElementById('resultGrade').textContent = grade.grade;
  document.getElementById('resultGrade').style.color = grade.color;
  document.getElementById('resultTagline').textContent = grade.tag;

  // Bars
  document.getElementById('resultBars').innerHTML = DIMS.map(d => `
    <div class="result-bar-row">
      <div class="result-bar-label">${DIM_NAMES[d]}</div>
      <div class="result-bar-bg"><div class="result-bar-fill" style="width:0%;background:${DIM_COLORS[d]}" data-w="${finalScores[d]}"></div></div>
      <div class="result-bar-val" style="color:${DIM_COLORS[d]}">${finalScores[d]}</div>
    </div>
  `).join('');
  setTimeout(() => {
    document.querySelectorAll('.result-bar-fill').forEach(el => el.style.width = el.dataset.w + '%');
  }, 200);

  // AI tip
  const weakest = DIMS.reduce((a, b) => finalScores[a] < finalScores[b] ? a : b);
  const strongest = DIMS.reduce((a, b) => finalScores[a] > finalScores[b] ? a : b);
  const tips = {
    action:'매일 할 일 3가지만 정하고 반드시 실행해보세요. 5분법칙 플래너가 도움이 됩니다.',
    mindset:'성공한 사람들의 이야기를 매일 5분씩 읽어보세요. 마인드셋은 반복으로 바뀝니다.',
    communication:'AI 세일즈 코치와 대화 연습을 해보세요. 거절 상황 시뮬레이션이 특히 효과적입니다.',
    resilience:'거절 일기를 써보세요. 거절을 기록하면 두려움이 줄어듭니다.',
    leadership:'먼저 자신의 성과를 만들고, 그 과정을 팀원에게 공유하세요.',
    learning:'하루 10분 영업 관련 콘텐츠를 학습하세요. 꾸준함이 전문가를 만듭니다.',
    planning:'수입 시뮬레이터로 목표를 역산해보세요. 구체적 숫자가 동기를 만듭니다.',
    networking:'하루 1명, 새로운 사람에게 먼저 인사해보세요. 작은 습관이 큰 네트워크를 만듭니다.'
  };
  document.getElementById('aiTip').textContent =
    `당신의 가장 강한 역량은 "${DIM_NAMES[strongest]}"이에요! "${DIM_NAMES[weakest]}"을 보강하면 성공 확률이 크게 올라갑니다. ${tips[weakest]}`;

  window._successResult = { overall, finalScores, grade: grade.grade };
}

function submitEmail() {
  const email = document.getElementById('resultEmail').value.trim();
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { alert('올바른 이메일을 입력해주세요'); return; }

  // Save to leads DB
  if (window.dinoSupabase) {
    window.dinoSupabase.from('leads').insert({
      source: 'calculator',
      email,
      quiz_result: window._successResult || {}
    }).then(() => {});
  }

  document.getElementById('emailSection').innerHTML = `
    <div style="padding:8px;text-align:center">
      <div style="font-size:32px;margin-bottom:8px">📩</div>
      <div style="font-weight:700;font-size:15px;margin-bottom:4px">발송 완료!</div>
      <div style="font-size:13px;color:var(--text2)">${email}로 상세 분석을 보내드릴게요</div>
    </div>`;
}

function shareResult() {
  const r = window._successResult;
  const text = `🎯 NM 성공 확률 진단 결과\n\n성공 확률: ${r?.overall || 0}%\n등급: ${r?.grade || ''}\n\n나도 진단해보기 👉 app.wellstar.life/success-test/`;
  if (navigator.share) {
    navigator.share({ title: 'NM 성공 확률 진단', text });
  } else {
    navigator.clipboard.writeText(text).then(() => alert('결과가 복사되었습니다!'));
  }
}
</script>
<script src="/shared/theme-toggle.js"></script>
<script src="/shared/nav.js"></script>
</body>
</html>
