<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a14">
<title>🏢 회사 카탈로그 (관리자) — 옆집디노</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a14;--bg2:#12122a;--card:#1a1a30;--border:rgba(255,255,255,0.08);--text:#F5F5F7;--text2:rgba(255,255,255,0.7);--text3:rgba(255,255,255,0.45);--accent:#FF6B35;--green:#30D158;--red:#FF453A}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.wrap{max-width:560px;margin:0 auto;padding:0 16px 100px}
.header{padding:18px 0 14px;display:flex;align-items:center;gap:10px}
.back-btn{width:40px;height:40px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text);text-decoration:none}
.title{font-size:20px;font-weight:800}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px}
.sec-title{font-size:15px;font-weight:800;margin:6px 2px 10px}
label{font-size:12px;color:var(--text2);display:block;margin:10px 2px 4px}
.input,textarea{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:14px;outline:none;font-family:inherit}
.input:focus,textarea:focus{border-color:var(--accent)}
textarea{min-height:54px;resize:vertical}
.btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#FF6B35,#FF8F65);color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:14px}
.btn:disabled{opacity:.5}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2);font-size:13px;padding:9px 12px;border-radius:10px;cursor:pointer;font-family:inherit}
.prod{border:1px solid var(--border);border-radius:12px;padding:12px;margin-top:10px;position:relative}
.prod .rm{position:absolute;top:8px;right:8px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.msg{margin-top:10px;font-size:13px;min-height:16px}
.msg.ok{color:var(--green)} .msg.err{color:var(--red)}
.comp-item{border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.comp-item h4{font-size:15px;font-weight:800;margin-bottom:4px}
.comp-item .p{font-size:12.5px;color:var(--text2);margin-top:3px;line-height:1.5}
.empty{color:var(--text3);font-size:13px;text-align:center;padding:18px}
</style>
</head>
<body>
<div class="wrap">
  <div class="header"><a class="back-btn" href="/main">←</a><div class="title">🏢 회사 카탈로그</div></div>

  <div id="gate" class="card" style="display:none;text-align:center">
    <div style="color:var(--text2);font-size:14px">관리자(옆집디노)만 사용할 수 있어요.</div>
  </div>

  <div id="app" style="display:none">
    <!-- 추가 -->
    <div class="card">
      <div class="sec-title">➕ 회사 추가 — 링크로 자동 정리</div>
      <label>회사 홈페이지 / 제품 소개 링크</label>
      <input class="input" id="url" type="url" placeholder="https://...">
      <button class="btn" id="parseBtn" onclick="parseLink()">🔎 링크 불러와서 정리</button>
      <div class="msg" id="parseMsg"></div>

      <!-- 검토/수정 폼 -->
      <div id="editForm" style="display:none;margin-top:14px;border-top:1px solid var(--border);padding-top:14px">
        <label>회사/브랜드명</label>
        <input class="input" id="cName">
        <label>브랜드 톤 (한 줄)</label>
        <input class="input" id="cTone" placeholder="예: 신뢰감 있는 건강 전문">
        <label>금지/주의 표현 (선택)</label>
        <textarea id="cNotes" placeholder="예: 치료·완치 등 의료 단정 표현 금지"></textarea>

        <div class="sec-title" style="margin-top:14px">제품</div>
        <div id="prodList"></div>
        <button class="btn-ghost" style="margin-top:10px" onclick="addProduct()">+ 제품 추가</button>

        <button class="btn" id="saveBtn" onclick="saveCompany()">💾 저장</button>
        <div class="msg" id="saveMsg"></div>
      </div>
    </div>

    <!-- 목록 -->
    <div class="sec-title">📚 등록된 회사</div>
    <div id="list" class="card"><div class="empty">불러오는 중…</div></div>
  </div>
</div>

<script src="/shared/supabase.js"></script>
<script src="/shared/auth.js"></script>
<script>
let sb=null, session=null, editingId=null;
function el(id){return document.getElementById(id);}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

async function init(){
  if(window.dinoSupabase) sb=window.dinoSupabase;
  else { await new Promise(r=>window.addEventListener('dino-supabase-ready',r,{once:true})); sb=window.dinoSupabase; }
  const { data:{session:s} } = await sb.auth.getSession();
  if(!s){ if(window.DinoAuth) DinoAuth.showLogin(); el('gate').style.display='block'; return; }
  session=s;
  const { data:prof } = await sb.from('profiles').select('role').eq('id',s.user.id).single();
  if(!prof || prof.role!=='admin'){ el('gate').style.display='block'; return; }
  el('app').style.display='block';
  addProduct(); // 빈 제품 1개
  loadList();
}

// ── 링크 파싱 ──
async function parseLink(){
  editingId=null;
  const url=el('url').value.trim();
  if(!/^https?:\/\//i.test(url)){ showMsg('parseMsg','올바른 링크를 입력해주세요.',false); return; }
  const btn=el('parseBtn'); btn.disabled=true; btn.textContent='정리 중… (10~20초)';
  try{
    const token=(await sb.auth.getSession()).data.session.access_token;
    const res=await fetch('/api/company-parse',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({url})});
    const data=await res.json();
    if(!res.ok){ showMsg('parseMsg', data.message||'정리 실패', false); return; }
    el('cName').value=data.company_name||'';
    el('cTone').value=data.brand_tone||'';
    el('cNotes').value='';
    el('prodList').innerHTML='';
    (data.products&&data.products.length?data.products:[{}]).forEach(p=>addProduct(p));
    el('editForm').style.display='block';
    el('saveBtn').textContent='💾 저장';
    showMsg('parseMsg','✅ 정리됐어요. 검토·수정 후 저장하세요.',true);
  }catch(e){ showMsg('parseMsg','네트워크 오류',false); }
  finally{ btn.disabled=false; btn.textContent='🔎 링크 불러와서 정리'; }
}

// ── 제품 입력 행 ──
function addProduct(p){
  p=p||{};
  const div=document.createElement('div'); div.className='prod';
  div.innerHTML=`
    <button class="btn-ghost rm" onclick="this.parentNode.remove()">삭제</button>
    <label>제품명</label><input class="input p-name" value="${esc(p.name)}" placeholder="예: 메타부스트">
    <div class="row2"><div><label>카테고리</label><input class="input p-cat" value="${esc(p.category)}" placeholder="예: 체중관리 보충제"></div>
    <div><label>핵심 효능</label><input class="input p-ben" value="${esc(p.benefits)}" placeholder="예: 식욕억제, 부기완화"></div></div>
    <label>금지/주의 표현</label><input class="input p-cau" value="${esc(p.cautions)}" placeholder="예: 치료·완치 단정 금지">`;
  el('prodList').appendChild(div);
}
function collectProducts(){
  return [...document.querySelectorAll('#prodList .prod')].map(d=>({
    name:d.querySelector('.p-name').value.trim(),
    category:d.querySelector('.p-cat').value.trim(),
    benefits:d.querySelector('.p-ben').value.trim(),
    cautions:d.querySelector('.p-cau').value.trim(),
  })).filter(p=>p.name);
}

// ── 저장 ──
async function saveCompany(){
  const name=el('cName').value.trim();
  if(!name){ showMsg('saveMsg','회사명을 입력해주세요.',false); return; }
  const btn=el('saveBtn'); btn.disabled=true; btn.textContent='저장 중…';
  const fields={ name, website:el('url').value.trim()||null, brand_tone:el('cTone').value.trim()||null, notes:el('cNotes').value.trim()||null };
  try{
    let companyId;
    if(editingId){
      const { error }=await sb.from('companies').update(fields).eq('id', editingId);
      if(error){ showMsg('saveMsg','수정 실패: '+error.message,false); return; }
      companyId=editingId;
      await sb.from('company_products').delete().eq('company_id', companyId); // 제품 교체
    } else {
      const { data:comp, error }=await sb.from('companies').insert(fields).select().single();
      if(error){ showMsg('saveMsg','저장 실패: '+error.message,false); return; }
      companyId=comp.id;
    }
    const prods=collectProducts().map(p=>({...p, company_id:companyId}));
    if(prods.length){ const { error:pe }=await sb.from('company_products').insert(prods); if(pe){ showMsg('saveMsg','회사는 저장됨, 제품 저장 실패: '+pe.message,false); } }
    showMsg('saveMsg', editingId?'✅ 수정 완료!':'✅ 저장 완료!', true);
    editingId=null;
    el('editForm').style.display='none'; el('url').value=''; el('parseMsg').textContent=''; el('saveBtn').textContent='💾 저장';
    loadList();
  }catch(e){ showMsg('saveMsg','오류: '+e.message,false); }
  finally{ btn.disabled=false; btn.textContent='💾 저장'; }
}

// ── 목록 ──
async function loadList(){
  const { data:comps }=await sb.from('companies').select('*').order('created_at',{ascending:false});
  const box=el('list');
  if(!comps||!comps.length){ box.innerHTML='<div class="empty">아직 등록된 회사가 없어요</div>'; return; }
  const { data:prods }=await sb.from('company_products').select('*');
  box.innerHTML=comps.map(c=>{
    const ps=(prods||[]).filter(p=>p.company_id===c.id);
    const plist=ps.map(p=>`· ${esc(p.name)}${p.category?` (${esc(p.category)})`:''}${p.benefits?` — ${esc(p.benefits)}`:''}`).join('<br>')||'(제품 없음)';
    return `<div class="comp-item"><div style="float:right;display:flex;gap:6px">
        <button class="btn-ghost" onclick="editCompany('${c.id}')">수정</button>
        <button class="btn-ghost" onclick="delCompany('${c.id}','${esc(c.name)}')">삭제</button></div>
      <h4>${esc(c.name)}</h4>${c.brand_tone?`<div class="p" style="color:var(--text3)">${esc(c.brand_tone)}</div>`:''}
      <div class="p">${plist}</div></div>`;
  }).join('');
}
async function delCompany(id,name){
  if(!confirm(`'${name}' 회사와 제품을 모두 삭제할까요?`)) return;
  await sb.from('companies').delete().eq('id',id);
  loadList();
}
async function editCompany(id){
  editingId=id;
  const { data:c }=await sb.from('companies').select('*').eq('id',id).single();
  const { data:ps }=await sb.from('company_products').select('*').eq('company_id',id);
  el('cName').value=c.name||''; el('cTone').value=c.brand_tone||''; el('cNotes').value=c.notes||''; el('url').value=c.website||'';
  el('prodList').innerHTML='';
  ((ps&&ps.length)?ps:[{}]).forEach(p=>addProduct(p));
  el('editForm').style.display='block';
  el('saveBtn').textContent='💾 수정 저장';
  showMsg('parseMsg', `✏️ '${c.name}' 수정 중 — 고치고 저장하세요`, true);
  el('editForm').scrollIntoView({behavior:'smooth'});
}

function showMsg(id,text,ok){ const m=el(id); m.textContent=text; m.className='msg '+(ok?'ok':'err'); }

init();
</script>
</body>
</html>
