<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a1a2e">
<title>로딩 중...</title>
<meta property="og:type" content="profile">
<meta property="og:title" id="ogTitle" content="옆집디노 사업자 페이지">
<meta property="og:description" id="ogDesc" content="">
<meta property="og:image" id="ogImage" content="">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
<style>
/* ═══ Themes — 더 깊은 색상 + 그라데이션 ═══ */
.theme-dark-orange {
  --bg: #0d0d18; --bg-soft: #15151f;
  --card: rgba(255,255,255,0.06); --card-hover: rgba(255,255,255,0.10);
  --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.15);
  --text: #FFFFFF; --text2: rgba(255,255,255,0.75); --text3: rgba(255,255,255,0.45);
  --accent: #FF7B3D; --accent2: #FFA66B;
  --grad: linear-gradient(135deg, #FF7B3D 0%, #FFA66B 100%);
  --grad-hero: linear-gradient(180deg, transparent 30%, rgba(13,13,24,0.4) 70%, rgba(13,13,24,0.95) 100%);
}
.theme-deep-purple {
  --bg: #0f0a1f; --bg-soft: #1a1335;
  --card: rgba(255,255,255,0.06); --card-hover: rgba(255,255,255,0.10);
  --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.15);
  --text: #FFFFFF; --text2: rgba(255,255,255,0.75); --text3: rgba(255,255,255,0.45);
  --accent: #C470FF; --accent2: #E29BFF;
  --grad: linear-gradient(135deg, #C470FF 0%, #E29BFF 100%);
  --grad-hero: linear-gradient(180deg, transparent 30%, rgba(15,10,31,0.4) 70%, rgba(15,10,31,0.95) 100%);
}
.theme-ocean-blue {
  --bg: #061525; --bg-soft: #0f2742;
  --card: rgba(255,255,255,0.06); --card-hover: rgba(255,255,255,0.10);
  --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.15);
  --text: #FFFFFF; --text2: rgba(255,255,255,0.75); --text3: rgba(255,255,255,0.45);
  --accent: #4EBDFF; --accent2: #7AD0FF;
  --grad: linear-gradient(135deg, #4EBDFF 0%, #7AD0FF 100%);
  --grad-hero: linear-gradient(180deg, transparent 30%, rgba(6,21,37,0.4) 70%, rgba(6,21,37,0.95) 100%);
}
.theme-forest-green {
  --bg: #061a14; --bg-soft: #0f2a22;
  --card: rgba(255,255,255,0.06); --card-hover: rgba(255,255,255,0.10);
  --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.15);
  --text: #FFFFFF; --text2: rgba(255,255,255,0.75); --text3: rgba(255,255,255,0.45);
  --accent: #4FE082; --accent2: #7FEDA0;
  --grad: linear-gradient(135deg, #4FE082 0%, #7FEDA0 100%);
  --grad-hero: linear-gradient(180deg, transparent 30%, rgba(6,26,20,0.4) 70%, rgba(6,26,20,0.95) 100%);
}
.theme-rose-gold {
  --bg: #1a0d14; --bg-soft: #2a1722;
  --card: rgba(255,255,255,0.06); --card-hover: rgba(255,255,255,0.10);
  --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.15);
  --text: #FFFFFF; --text2: rgba(255,255,255,0.75); --text3: rgba(255,255,255,0.45);
  --accent: #FF7BAB; --accent2: #FFA8C8;
  --grad: linear-gradient(135deg, #FF7BAB 0%, #FFA8C8 100%);
  --grad-hero: linear-gradient(180deg, transparent 30%, rgba(26,13,20,0.4) 70%, rgba(26,13,20,0.95) 100%);
}
.theme-midnight {
  --bg: #000; --bg-soft: #0a0a14;
  --card: rgba(255,255,255,0.06); --card-hover: rgba(255,255,255,0.10);
  --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.15);
  --text: #FFFFFF; --text2: rgba(255,255,255,0.75); --text3: rgba(255,255,255,0.45);
  --accent: #8DEAFF; --accent2: #B3F0FF;
  --grad: linear-gradient(135deg, #8DEAFF 0%, #B3F0FF 100%);
  --grad-hero: linear-gradient(180deg, transparent 30%, rgba(0,0,0,0.4) 70%, rgba(0,0,0,0.95) 100%);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent }
html, body {
  background: var(--bg); color: var(--text);
  font-family: 'Pretendard', -apple-system, sans-serif;
  min-height: 100vh; line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
img { max-width: 100%; display: block }
a { color: inherit; text-decoration: none }
.serif { font-family: 'Playfair Display', 'Pretendard', serif; }

.wrap {
  max-width: 480px; margin: 0 auto;
  background: var(--bg); min-height: 100vh;
  position: relative; overflow: hidden;
}

/* ─── 히어로 ─── */
.hero {
  position: relative; width: 100%; aspect-ratio: 16/9;
  background: var(--grad); background-size: cover; background-position: center;
  overflow: hidden;
}
.hero.no-image::before {
  content: ''; position: absolute; inset: 0;
  background-image:
    radial-gradient(circle at 30% 20%, rgba(255,255,255,0.15), transparent 50%),
    radial-gradient(circle at 70% 80%, rgba(255,255,255,0.10), transparent 50%);
}
.hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.35));
}

/* 프로필 영역 (히어로 아래) — 카드처럼 */
.profile-block {
  padding: 0 24px; margin-top: -50px; position: relative; z-index: 2;
  text-align: left;
}
.profile-circle {
  width: 96px; height: 96px; border-radius: 50%;
  background-size: cover; background-position: center;
  border: 4px solid var(--bg); margin-bottom: 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.35);
  background-color: var(--bg-soft);
  display: flex; align-items: center; justify-content: center; font-size: 40px;
}
.profile-name {
  font-size: 30px; font-weight: 800; letter-spacing: -0.03em;
  margin-bottom: 8px; line-height: 1.1; color: var(--text);
}
.profile-title {
  font-size: 14px; color: var(--accent); font-weight: 700;
  letter-spacing: 0.02em; margin-bottom: 14px;
  display: inline-block; padding: 5px 14px;
  background: var(--card); border: 1px solid var(--border-strong);
  border-radius: 100px;
}
.profile-intro {
  font-size: 16px; color: var(--text2); line-height: 1.6;
  max-width: 380px;
}

/* ─── SNS 행 ─── */
.sns-strip {
  display: flex; gap: 10px; padding: 24px 24px 8px;
  flex-wrap: wrap; justify-content: center;
}
.sns-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 10px 14px; border-radius: 16px; background: var(--card);
  border: 1px solid var(--border); transition: transform .2s, background .2s;
  min-width: 64px;
}
.sns-btn:active { transform: scale(0.94) }
.sns-btn .ic { font-size: 20px }
.sns-btn .lb { font-size: 10px; color: var(--text2); font-weight: 600 }

/* ─── 섹션 공통 ─── */
.section { padding: 24px }
.section-eyebrow {
  display: inline-block; font-size: 10px; letter-spacing: 0.18em;
  color: var(--accent); font-weight: 700; text-transform: uppercase;
  padding: 4px 10px; background: var(--card); border: 1px solid var(--border);
  border-radius: 100px; margin-bottom: 10px;
}
.section-h {
  font-size: 22px; font-weight: 800; letter-spacing: -0.02em;
  margin-bottom: 16px; line-height: 1.2;
}

/* ─── 갤러리 ─── */
.gallery {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px;
}
.gallery-item {
  aspect-ratio: 1; background: var(--card); background-size: cover; background-position: center;
  border-radius: 10px; cursor: zoom-in; transition: transform .25s;
  position: relative; overflow: hidden;
}
.gallery-item:active { transform: scale(0.97) }
.gallery-item::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 50%, rgba(0,0,0,0.15));
  opacity: 0; transition: opacity .25s;
}
.gallery-item:hover::after { opacity: 1 }

/* ─── 리드마그넷 (CTA 카드) ─── */
.magnets { display: flex; flex-direction: column; gap: 10px }
.magnet {
  position: relative; display: flex; align-items: center; gap: 14px;
  padding: 18px 18px 18px 16px; border-radius: 16px;
  background: var(--card); border: 1px solid var(--border);
  transition: background .2s, transform .2s, border-color .2s;
  overflow: hidden;
}
.magnet::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--grad); opacity: 0.85;
}
.magnet:active {
  transform: scale(0.98);
  background: var(--card-hover);
  border-color: var(--border-strong);
}
.magnet-icon {
  width: 48px; height: 48px; border-radius: 14px;
  background: var(--grad); display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.magnet-info { flex: 1; min-width: 0 }
.magnet-name {
  font-size: 15px; font-weight: 800; margin-bottom: 3px; letter-spacing: -0.01em;
}
.magnet-desc {
  font-size: 12px; color: var(--text2); line-height: 1.5;
}
.magnet-arrow {
  font-size: 16px; color: var(--accent); font-weight: 800;
  margin-left: 6px; opacity: 0.7;
}

/* ─── QR 섹션 ─── */
.qr-section {
  margin: 24px;
  padding: 28px 22px; border-radius: 22px;
  background: var(--card); border: 1px solid var(--border);
  text-align: center;
}
.qr-section h3 {
  font-size: 13px; font-weight: 700; color: var(--text2);
  margin-bottom: 16px; letter-spacing: 0.05em;
}
#qrCanvas {
  margin: 0 auto; display: block; padding: 12px;
  background: #fff; border-radius: 12px; width: fit-content;
}
.qr-actions { display: flex; gap: 8px; margin-top: 18px; justify-content: center }
.qr-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 20px; border-radius: 100px; border: none;
  font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: inherit; transition: transform .15s;
}
.qr-btn:active { transform: scale(0.96) }
.qr-btn.primary { background: var(--grad); color: #fff }
.qr-btn.ghost { background: var(--card); color: var(--text); border: 1px solid var(--border) }

/* ─── 푸터 ─── */
.footer {
  text-align: center; padding: 28px 24px 36px;
  font-size: 11px; color: var(--text3);
}
.footer-brand {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 18px; border-radius: 100px;
  background: var(--card); border: 1px solid var(--border);
  font-size: 12px; font-weight: 700; color: var(--text2);
  margin-bottom: 8px;
}
.footer-brand .dino { font-size: 18px }

/* ─── 로딩/에러 ─── */
.center-msg {
  display: flex; align-items: center; justify-content: center; min-height: 80vh;
  text-align: center; padding: 24px; flex-direction: column; gap: 14px;
}
.center-msg .ic { font-size: 64px; opacity: 0.5 }
.center-msg p { color: var(--text2); font-size: 14px }
.center-msg a {
  margin-top: 6px; color: var(--accent); font-weight: 700; font-size: 13px;
}

/* ─── Lightbox ─── */
.lightbox {
  position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 9999;
  display: none; align-items: center; justify-content: center; padding: 20px;
}
.lightbox.open { display: flex }
.lightbox img {
  max-width: 100%; max-height: 90vh; border-radius: 12px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.lightbox-close {
  position: absolute; top: 20px; right: 20px;
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255,255,255,0.15); backdrop-filter: blur(12px);
  border: none; color: #fff; font-size: 22px; cursor: pointer;
}

/* ─── Fade-in 애니메이션 ─── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px) }
  to { opacity: 1; transform: translateY(0) }
}
.fade { animation: fadeUp 0.5s ease both }
.fade.d1 { animation-delay: 0.05s }
.fade.d2 { animation-delay: 0.1s }
.fade.d3 { animation-delay: 0.15s }
.fade.d4 { animation-delay: 0.2s }
</style>
</head>
<body class="theme-dark-orange">

<div class="wrap" id="wrap">
  <div class="center-msg">
    <div class="ic">⏳</div>
    <p>불러오는 중...</p>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <img id="lightboxImg" alt="">
</div>

<script src="/shared/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs@gh-pages/qrcode.min.js"></script>
<script>
const LEAD_MAGNETS = [
  { id: 'saju', icon: '🔮', name: '사주 성공 DNA', desc: '내 사주로 알아보는 영업 성향 + 행운 전략', url: '/saju/' },
  { id: 'branding-coach', icon: '✍️', name: '블로그 브랜딩 코치', desc: 'AI가 만들어주는 나만의 블로그 정체성', url: '/branding-coach/' },
  { id: 'quiz', icon: '🧬', name: '영업 스타일 진단', desc: '8가지 유형 중 나는 어떤 영업인?', url: '/quiz/' },
  { id: 'success-test', icon: '🎯', name: 'NM 성공 확률 진단', desc: '시작 전 솔직 체크 + 맞춤 전략', url: '/success-test/' },
  { id: 'health-check', icon: '🦕', name: '건강 밸런스 진단', desc: '몸이 보내는 영양 신호 한눈에 체크', url: '/health-check/' }
];

function getSlug() {
  const path = location.pathname.replace(/\/+$/, '');
  const m = path.match(/\/p\/([^/]+)$/);
  if (m) return decodeURIComponent(m[1]);
  const sp = new URLSearchParams(location.search);
  return sp.get('slug') || sp.get('p') || null;
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escAttr(s) {
  if (!s) return '';
  return String(s).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// 외부 URL 정규화 — DB에 저장된 옛 데이터가 http(s):// 없을 수 있음
function normalizeExternalUrl(s) {
  if (!s) return '';
  const t = String(s).trim();
  if (!t) return '';
  if (/^https?:\/\//i.test(t)) return t;
  if (/^(mailto:|tel:)/i.test(t)) return t;
  return 'https://' + t.replace(/^\/+/, '');
}

async function waitSupabase(maxMs) {
  if (window.dinoSupabase) return true;
  await Promise.race([
    new Promise(r => window.addEventListener('dino-supabase-ready', r, { once: true })),
    new Promise(r => setTimeout(r, maxMs || 5000))
  ]);
  return !!window.dinoSupabase;
}

function showError(icon, msg) {
  document.getElementById('wrap').innerHTML = `
    <div class="center-msg">
      <div class="ic">${icon}</div>
      <p>${msg}</p>
      <a href="/main/">옆집디노 홈으로 →</a>
    </div>
  `;
}

async function loadCard() {
  const slug = getSlug();
  if (!slug) { showError('❓', '잘못된 주소입니다'); return; }

  const ok = await waitSupabase(5000);
  if (!ok) { showError('⚠️', '연결 실패<br>잠시 후 새로고침해주세요'); return; }

  const { data, error } = await window.dinoSupabase
    .from('public_cards').select('*').eq('slug', slug).maybeSingle();

  if (error || !data) { showError('🔍', '아직 이 페이지가 없거나<br>비공개입니다'); return; }
  if (!data.is_public) { showError('🔒', '비공개 페이지입니다'); return; }

  window.dinoSupabase.rpc('increment_public_card_view', { card_slug: slug }).then(()=>{}).catch(()=>{});

  render(data);
}

function render(c) {
  document.body.className = 'theme-' + (c.theme || 'dark-orange');

  const fullName = c.display_name || '옆집디노 회원';
  document.title = `${fullName} · ${c.title || '내 소개 페이지'}`;
  document.getElementById('ogTitle').content = `${fullName} — ${c.title || '내 소개 페이지'}`;
  document.getElementById('ogDesc').content = c.intro || '';
  if (c.hero_url) document.getElementById('ogImage').content = c.hero_url;

  const heroStyle = c.hero_url ? `style="background-image:url('${escAttr(c.hero_url)}')"` : '';
  const profileStyle = c.profile_url ? `style="background-image:url('${escAttr(c.profile_url)}')"` : '';
  const profileChar = c.profile_url ? '' : (fullName[0] || '🦕');

  const products = Array.isArray(c.product_urls) ? c.product_urls.filter(Boolean) : [];
  const activities = Array.isArray(c.activity_urls) ? c.activity_urls.filter(Boolean) : [];
  const enabledMagnets = Array.isArray(c.enabled_magnets) ? c.enabled_magnets : ['saju','branding-coach','quiz','success-test','health-check'];

  // SNS 버튼 — URL 자동 정규화 (옛 데이터 호환)
  const snsButtons = [];
  if (c.phone) snsButtons.push(`<a class="sns-btn" href="tel:${escAttr(c.phone)}"><span class="ic">📞</span><span class="lb">전화</span></a>`);
  if (c.kakao_id) snsButtons.push(`<a class="sns-btn" href="https://open.kakao.com/o/${escAttr(c.kakao_id)}" target="_blank" rel="noopener"><span class="ic">💬</span><span class="lb">카톡</span></a>`);
  const insta = normalizeExternalUrl(c.instagram_url);
  if (insta) snsButtons.push(`<a class="sns-btn" href="${escAttr(insta)}" target="_blank" rel="noopener"><span class="ic">📷</span><span class="lb">인스타</span></a>`);
  const blog = normalizeExternalUrl(c.blog_url);
  if (blog) snsButtons.push(`<a class="sns-btn" href="${escAttr(blog)}" target="_blank" rel="noopener"><span class="ic">📝</span><span class="lb">블로그</span></a>`);
  const youtube = normalizeExternalUrl(c.youtube_url);
  if (youtube) snsButtons.push(`<a class="sns-btn" href="${escAttr(youtube)}" target="_blank" rel="noopener"><span class="ic">▶️</span><span class="lb">유튜브</span></a>`);

  const magnets = enabledMagnets.map(id => {
    const m = LEAD_MAGNETS.find(x => x.id === id);
    if (!m) return '';
    const href = `${m.url}?ref=${encodeURIComponent(c.slug)}`;
    return `<a class="magnet" href="${href}">
      <div class="magnet-icon">${m.icon}</div>
      <div class="magnet-info">
        <div class="magnet-name">${m.name}</div>
        <div class="magnet-desc">${m.desc}</div>
      </div>
      <div class="magnet-arrow">→</div>
    </a>`;
  }).join('');

  const productGrid = products.length ? `
    <section class="section fade d1">
      <div class="section-eyebrow">PORTFOLIO</div>
      <h2 class="section-h">내 제품</h2>
      <div class="gallery">${products.map(u => `<div class="gallery-item" style="background-image:url('${escAttr(u)}')" onclick="openLightbox('${escAttr(u)}')"></div>`).join('')}</div>
    </section>` : '';

  const activityGrid = activities.length ? `
    <section class="section fade d2">
      <div class="section-eyebrow">MOMENTS</div>
      <h2 class="section-h">활동 모습</h2>
      <div class="gallery">${activities.map(u => `<div class="gallery-item" style="background-image:url('${escAttr(u)}')" onclick="openLightbox('${escAttr(u)}')"></div>`).join('')}</div>
    </section>` : '';

  const pageUrl = `https://app.wellstar.life/p/${encodeURIComponent(c.slug)}`;

  document.getElementById('wrap').innerHTML = `
    <header class="hero ${c.hero_url ? '' : 'no-image'}" ${heroStyle}>
      <div class="hero-overlay"></div>
    </header>

    <div class="profile-block fade">
      <div class="profile-circle" ${profileStyle}>${profileChar}</div>
      <div class="profile-name serif">${escHtml(fullName)}</div>
      ${c.title ? `<div class="profile-title">${escHtml(c.title)}</div>` : ''}
      ${c.intro ? `<div class="profile-intro">${escHtml(c.intro)}</div>` : ''}
    </div>

    ${snsButtons.length ? `<div class="sns-strip fade d1">${snsButtons.join('')}</div>` : ''}

    ${productGrid}
    ${activityGrid}

    <section class="section fade d3">
      <div class="section-eyebrow">FREE</div>
      <h2 class="section-h">무료 진단 받기</h2>
      <div class="magnets">${magnets}</div>
    </section>

    <div class="qr-section fade d4">
      <h3>📱 QR로 페이지 저장하기</h3>
      <div id="qrCanvas"></div>
      <div class="qr-actions">
        <button class="qr-btn primary" onclick="sharePage()">🔗 링크 공유</button>
      </div>
    </div>

    <div class="footer">
      <div class="footer-brand">
        <span class="dino">🦕</span>
        옆집디노 AI 세일즈 시스템
      </div>
      <div><a href="/main/" style="color:var(--accent);font-weight:700">자세히 보기 →</a></div>
    </div>
  `;

  // QR
  try {
    new QRCode(document.getElementById('qrCanvas'), {
      text: pageUrl, width: 130, height: 130, correctLevel: QRCode.CorrectLevel.M
    });
  } catch {}

  window.sharePage = async function() {
    // navigator.share는 text와 url 둘 다 주면 카톡이 url을 두 번 표시 → text엔 안내만, url만 별도로
    if (navigator.share) {
      try {
        await navigator.share({
          title: `${fullName}님 소개 페이지`,
          text: `${fullName}님 소개 페이지`,
          url: pageUrl
        });
      } catch {}
    } else {
      await navigator.clipboard.writeText(pageUrl);
      alert('링크가 복사됐어요!');
    }
  };
}

function openLightbox(url) {
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(e) {
  if (e && e.target.tagName === 'IMG') return;
  document.getElementById('lightbox').classList.remove('open');
}

loadCard();
</script>
</body>
</html>
