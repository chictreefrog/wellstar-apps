<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FAFAF9">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>건강 밸런스 진단 — 옆집디노</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#FAFAF9;font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;color:#1C1917}
.app{max-width:420px;margin:0 auto;min-height:100vh}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes confetti1{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(-60px) rotate(360deg) translateX(30px);opacity:0}}
@keyframes confetti2{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(-50px) rotate(-270deg) translateX(-25px);opacity:0}}

.screen{display:none}
.screen.active{display:block}

/* Intro */
.intro{padding:48px 20px 40px;animation:fadeUp .6s ease}
.intro-icon{font-size:56px;text-align:center;margin-bottom:4px;animation:float 3s ease-in-out infinite}
.intro-title{font-size:24px;font-weight:800;text-align:center;line-height:1.4;margin-bottom:8px;letter-spacing:-.5px}
.intro-sub{font-size:14px;color:#78716C;text-align:center;margin-bottom:28px}
.intro-card{background:white;border-radius:20px;padding:24px;box-shadow:0 1px 8px rgba(0,0,0,.05);margin-bottom:24px;font-size:15px;color:#44403C;line-height:1.9;word-break:keep-all}
.intro-card p{margin:0 0 12px}
.intro-card p:last-child{margin:0}
.intro-card strong{color:#DC2626}
.type-chips{display:flex;gap:6px;margin-bottom:24px;justify-content:center;flex-wrap:wrap}
.type-chip{font-size:11.5px;padding:5px 10px;background:#F5F5F4;border-radius:100px;color:#78716C;white-space:nowrap}
.btn-start{width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,#1C1917,#292524);color:white;font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.2);font-family:inherit}
.btn-start:active{transform:scale(.98)}
.intro-note{text-align:center;font-size:12px;color:#A8A29E;margin-top:14px}

/* Quiz */
.quiz{padding:32px 20px}
.progress-row{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.progress-bg{flex:1;background:#E7E5E4;border-radius:100px;height:6px;overflow:hidden}
.progress-fill{background:linear-gradient(90deg,#DC2626,#F97316);height:100%;border-radius:100px;transition:width .5s ease}
.progress-num{font-size:13px;font-weight:600;color:#78716C;flex-shrink:0}
.q-card{background:white;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.q-scene{font-size:13px;color:#A8A29E;font-weight:600;margin-bottom:6px}
.q-text{font-size:19px;font-weight:800;line-height:1.4}
.opt{border:2px solid #E7E5E4;background:white;border-radius:14px;padding:15px 16px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;transition:all .2s;margin-bottom:8px;user-select:none}
.opt:active{transform:scale(.98)}
.opt.sel{border-color:#059669;background:#ECFDF5}
.opt-icon{font-size:20px;flex-shrink:0;line-height:1}
.opt-text{font-size:14.5px;color:#44403C;line-height:1.6}
.opt.sel .opt-text{color:#065F46;font-weight:600}

/* Result */
.result{padding:32px 20px 48px}
.result-type{border-radius:24px;padding:32px 24px 24px;text-align:center;margin-bottom:16px;position:relative;overflow:hidden;transition:all .6s ease}
.result-type .conf1{position:absolute;top:18px;left:18%;font-size:14px;animation:confetti1 1.5s ease .5s both}
.result-type .conf2{position:absolute;top:28px;right:22%;font-size:12px;animation:confetti2 1.3s ease .7s both}
.result-emoji{font-size:52px;margin-bottom:8px}
.result-label{font-size:12px;font-weight:700;margin:0 0 2px;letter-spacing:.5px}
.result-name{font-size:24px;font-weight:900;margin:0 0 6px}
.result-tagline{font-size:14px;color:#57534E;font-weight:600}
.result-card{background:white;border-radius:20px;padding:24px;margin-bottom:16px;box-shadow:0 1px 8px rgba(0,0,0,.05)}
.result-desc{font-size:14px;color:#57534E;line-height:1.9;margin-bottom:16px;word-break:keep-all}
.result-insight{padding:14px 16px;border-radius:12px;border-left:3px solid;margin-bottom:14px}
.result-insight p{font-size:13px;color:#44403C;line-height:1.7;font-weight:500;word-break:keep-all;margin:0}
.result-msg{padding:12px 16px;background:#F5F5F4;border-radius:10px}
.result-msg p{font-size:13.5px;font-weight:600;margin:0}

.sub-types{background:white;border-radius:20px;padding:18px 24px;margin-bottom:16px;box-shadow:0 1px 8px rgba(0,0,0,.05)}
.sub-types-title{font-size:12px;font-weight:700;color:#78716C;margin-bottom:10px}
.sub-grid{display:flex;gap:8px}
.sub-item{flex:1;padding:12px 10px;background:#FAFAF9;border-radius:12px;text-align:center}
.sub-emoji{font-size:22px;margin-bottom:2px}
.sub-name{font-size:11.5px;font-weight:700;margin-bottom:1px}
.sub-tag{font-size:10.5px;color:#A8A29E}

.prod-title{font-size:14px;font-weight:700;margin:0 0 10px}
.prod-card{background:white;border-radius:20px;padding:22px;margin-bottom:10px;box-shadow:0 1px 8px rgba(0,0,0,.05);border-left:4px solid}
.prod-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.prod-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.prod-name{font-size:16px;font-weight:800;margin:0 0 2px}
.prod-sub{font-size:11.5px;color:#A8A29E;margin:0}
.prod-highlight{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px}
.prod-hl-label{font-size:11px;font-weight:800;padding:2px 8px;border-radius:6px;flex-shrink:0;margin-top:1px}
.prod-hl-desc{font-size:12.5px;color:#57534E;line-height:1.5}
.prod-cta{margin-top:12px;padding:10px 14px;border-radius:10px;text-align:center}
.prod-cta p{font-size:13px;font-weight:700;margin:0}

.cta-box{background:linear-gradient(135deg,#1C1917,#292524);border-radius:20px;padding:28px 24px;text-align:center;margin-bottom:16px}
.cta-box-icon{font-size:32px;margin-bottom:8px}
.cta-box-sub{font-size:12px;color:#A8A29E;margin:0 0 4px}
.cta-box-title{font-size:18px;font-weight:800;color:white;margin:0 0 6px}
.cta-box-desc{font-size:12px;color:#78716C;margin:0 0 16px;line-height:1.6}
.btn-kakao{display:inline-block;padding:14px 36px;background:#FEE500;color:#1C1917;border:none;border-radius:12px;font-size:15px;font-weight:700;text-decoration:none;cursor:pointer;font-family:inherit}
.btn-kakao:active{transform:scale(.97)}

.disclaimer{text-align:center;font-size:11px;color:#A8A29E;line-height:1.7;margin-bottom:20px}
.btn-reset{padding:12px 28px;background:white;color:#78716C;border:1px solid #E7E5E4;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.credit{text-align:center;margin-top:36px;padding-top:20px;border-top:1px solid #E7E5E4;font-size:12px;color:#D6D3D1}

/* Email */
.email-box{background:white;border-radius:20px;padding:20px;margin-bottom:16px;box-shadow:0 1px 8px rgba(0,0,0,.05);text-align:center}
.email-box-title{font-size:15px;font-weight:700;margin-bottom:4px}
.email-box-sub{font-size:12px;color:#78716C;margin-bottom:12px}
.email-row{display:flex;gap:8px}
.email-input{flex:1;padding:12px;border-radius:10px;border:1px solid #E7E5E4;font-size:14px;outline:none;font-family:inherit}
.email-input:focus{border-color:#DC2626}
.email-btn{padding:12px 20px;border-radius:10px;border:none;background:#DC2626;color:white;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;white-space:nowrap}
</style>
</head>
<body>
<div class="app">
  <!-- INTRO -->
  <div class="screen active" id="screen-intro">
    <div class="intro">
      <div class="intro-icon">🦕</div>
      <h1 class="intro-title">내 몸이 보내는<br>영양 SOS 신호는?</h1>
      <p class="intro-sub">옆집디노 건강 밸런스 진단</p>
      <div class="intro-card">
        <p>피로가 잘 안 풀리고, 건강검진 수치가 슬슬 올라가고, 여기저기 쑤시는 느낌 — </p>
        <p>그건 <strong>몸이 보내는 영양 불균형 신호</strong>예요 🚨</p>
        <p>9가지 일상 상황에서 "나 이거 완전 공감!" 하는 답을 골라보세요.</p>
      </div>
      <div class="type-chips">
        <span class="type-chip">🔥 불꽃체질</span>
        <span class="type-chip">🍩 달달위험</span>
        <span class="type-chip">💢 빨간불</span>
        <span class="type-chip">🌫️ 멍때리는</span>
        <span class="type-chip">🔋 방전된</span>
        <span class="type-chip">💪 건강왕</span>
      </div>
      <button class="btn-start" onclick="startQuiz()">시작하기 🦕</button>
      <p class="intro-note">9문항 · 약 2분 소요</p>
    </div>
  </div>

  <!-- QUIZ -->
  <div class="screen" id="screen-quiz">
    <div class="quiz">
      <div class="progress-row">
        <div class="progress-bg"><div class="progress-fill" id="progressBar"></div></div>
        <span class="progress-num" id="progressNum">1/9</span>
      </div>
      <div id="questionArea"></div>
    </div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="screen-result">
    <div class="result" id="resultArea"></div>
  </div>
</div>

<script src="/shared/supabase.js"></script>
<script src="/shared/nav.js"></script>
<script>
const TYPES={fire:{name:"🔥 불꽃체질 디노",emoji:"🔥",color:"#DC2626",bg:"linear-gradient(135deg,#FEE2E2,#FECACA)",border:"#DC2626",tagline:"몸 안의 불을 꺼야 해!",category:"boost",desc:"만성 염증은 눈에 보이지 않지만, 몸 곳곳에서 조용히 번지고 있어요. 관절통, 피부 트러블, 잦은 피로 — 이 모든 게 염증의 신호일 수 있어요. 특히 40대 이후에는 염증 관리가 건강 수명을 좌우해요.",insight:"테트라하이드로커큐민은 일반 커큐민보다 체내 흡수율이 월등히 높은 활성형 커큐민이에요. 흑후추 추출물이 흡수율을 더 끌어올려주고, 피크노제놀(국제특허원료)이 항산화력을 강화해요.",message:"몸속 만성 염증, 방치하면 안 돼요"},sugar:{name:"🍩 달달위험 디노",emoji:"🍩",color:"#EA580C",bg:"linear-gradient(135deg,#FFF7ED,#FFEDD5)",border:"#EA580C",tagline:"혈당 관리가 시급해!",category:"boost",desc:"식후 졸음, 갑자기 찾아오는 단것 욕구, 체중이 잘 안 빠지는 느낌 — 이건 혈당 롤러코스터를 타고 있다는 신호예요. 공복혈당이 '정상 범위'라도 식후 혈당 스파이크는 이미 시작됐을 수 있어요.",insight:"테트라하이드로커큐민의 항당 기능은 혈당 관리에 도움을 줘요. 여기에 비타민B군, 마그네슘, 아연이 인슐린 민감도와 에너지 대사를 지원해요.",message:"혈당 관리, 증상이 나타나기 전에 시작하세요"},pressure:{name:"💢 빨간불 디노",emoji:"💢",color:"#B91C1C",bg:"linear-gradient(135deg,#FEE2E2,#FED7D7)",border:"#B91C1C",tagline:"혈관부터 챙기자!",category:"boost",desc:"건강검진 때마다 혈압·혈당·콜레스테롤 수치가 신경 쓰이시죠? '3고'는 한꺼번에 관리해야 해요. 하나만 높아도 나머지가 따라 올라가는 연쇄 반응이 일어나거든요.",insight:"피크노제놀은 혈관 건강과 혈액순환 개선에 도움을 주는 국제특허원료예요. 테트라하이드로커큐민의 항염·항산화 기능과 함께 3고 관리의 기반을 잡아줘요.",message:"숫자가 말해주는 경고, 무시하지 마세요"},fog:{name:"🌫️ 멍때리는 디노",emoji:"🌫️",color:"#7C3AED",bg:"linear-gradient(135deg,#EDE9FE,#DDD6FE)",border:"#7C3AED",tagline:"뇌에 영양 공급이 필요해!",category:"brain",desc:"이름이 기억 안 나고, 뭘 하러 왔는지 깜빡하고, 멀티태스킹이 예전 같지 않죠? 이건 나이 탓이 아니라 두뇌 영양 부족의 신호예요.",insight:"메타브레인 PS는 고순도 포스파티딜세린 80%에 홍삼, 비타민B12, 아연을 더해 두뇌 기능을 집중 케어해요. 기억력, 집중력, 인지 기능이 고민이라면 이게 답이에요.",message:"깜빡깜빡, 그냥 넘기면 안 돼요"},battery:{name:"🔋 방전된 디노",emoji:"🔋",color:"#059669",bg:"linear-gradient(135deg,#D1FAE5,#A7F3D0)",border:"#059669",tagline:"에너지 충전이 급해!",category:"boost",desc:"충분히 잤는데도 피곤하고, 오후만 되면 배터리 방전. 이건 단순 피로가 아니라 세포 단위에서 에너지 생성이 제대로 안 되고 있다는 뜻이에요.",insight:"메타부스트 제니스는 단순 비타민제가 아닌 올인원 종합영양제예요. 18종 비타민·미네랄에 테트라하이드로커큐민, 피크노제놀까지 — 에너지부터 항산화까지 한 포에 해결해요.",message:"매일 배터리 20%로 버티고 있었군요"},balance:{name:"💪 건강왕 디노",emoji:"💪",color:"#0D9488",bg:"linear-gradient(135deg,#CCFBF1,#99F6E4)",border:"#0D9488",tagline:"잘하고 있어, 디노!",category:"both",desc:"전반적으로 컨디션 관리를 잘 하고 계시네요! 하지만 나이가 들수록 눈에 보이지 않는 염증과 산화 스트레스는 축적돼요. '지금은 괜찮다'가 아니라 '지금부터 관리한다'는 마음으로 미리 챙겨보세요.",insight:"예방 차원에서 항산화·항염 관리를 시작하면, 5년 뒤 10년 뒤의 건강이 확연히 달라져요.",message:"지금의 건강을 오래 유지하는 게 목표!"}};

let qIndex=0, answers=[], animating=false;

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+id).classList.add('active');window.scrollTo(0,0);}

function startQuiz(){
  qIndex=0;answers=[];
  try{const l=JSON.parse(localStorage.getItem('dino_activity_log')||'[]');l.unshift({app:'health-check',label:'건강 밸런스 진단 시작',ts:Date.now()});localStorage.setItem('dino_activity_log',JSON.stringify(l.slice(0,50)));}catch{}
  showScreen('quiz');renderQuestion();
}

function renderQuestion(){
  const q=QUESTIONS[qIndex];
  document.getElementById('progressBar').style.width=((qIndex+1)/QUESTIONS.length*100)+'%';
  document.getElementById('progressNum').textContent=(qIndex+1)+'/'+QUESTIONS.length;
  const area=document.getElementById('questionArea');
  area.style.animation='none';area.offsetHeight;area.style.animation='fadeUp .4s ease';
  area.innerHTML=`
    <div class="q-card"><p class="q-scene">${q.scene}</p><h2 class="q-text">${q.situation}</h2></div>
    ${q.options.map((o,i)=>`
      <div class="opt" onclick="selectOption(${i})" style="animation:slideUp .3s ease ${i*.06}s both">
        <span class="opt-icon">${o.icon}</span><span class="opt-text">${o.text}</span>
      </div>
    `).join('')}
  `;
}

function selectOption(idx){
  if(animating)return;animating=true;
  const opts=document.querySelectorAll('.opt');
  opts[idx].classList.add('sel');
  answers.push(QUESTIONS[qIndex].options[idx]);
  setTimeout(()=>{
    if(qIndex<QUESTIONS.length-1){qIndex++;animating=false;renderQuestion();}
    else{showScreen('result');renderResult();}
  },400);
}

function calcResult(){
  const scores={};Object.keys(TYPES).forEach(k=>scores[k]=0);
  answers.forEach(a=>{if(a)scores[a.type]=(scores[a.type]||0)+1;});
  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  return(sorted[0][1]===0||sorted[0][0]==='balance')?'balance':sorted[0][0];
}

function getSubTypes(mainType){
  const scores={};Object.keys(TYPES).forEach(k=>scores[k]=0);
  answers.forEach(a=>{if(a)scores[a.type]=(scores[a.type]||0)+1;});
  return Object.entries(scores).sort((a,b)=>b[1]-a[1]).filter(([k,v])=>v>0&&k!=='balance'&&k!==mainType).slice(0,2).map(([k])=>k);
}

function getProductRec(mainType,subTypes){
  const t=TYPES[mainType];const all=[mainType,...subTypes];
  const hasBoost=all.some(k=>TYPES[k]?.category==='boost');
  const hasBrain=all.some(k=>TYPES[k]?.category==='brain');
  if(t.category==='both'||(hasBoost&&hasBrain))return'both';
  if(t.category==='brain')return'brain';return'boost';
}

function renderProduct(p){
  return`<div class="prod-card" style="border-left-color:${p.color}">
    <div class="prod-header"><div class="prod-icon" style="background:${p.hlBg}">${p.emoji}</div><div><h4 class="prod-name">${p.name}</h4><p class="prod-sub">${p.sub}</p></div></div>
    ${p.highlights.map(h=>`<div class="prod-highlight"><span class="prod-hl-label" style="color:${p.color};background:${p.hlBg}">${h.label}</span><span class="prod-hl-desc">${h.desc}</span></div>`).join('')}
    <div class="prod-cta" style="background:${p.ctaBg}"><p style="color:${p.color}">${p.cta}</p></div>
  </div>`;
}

    html+=`<div class="sub-types"><p class="sub-types-title">함께 주의할 신호</p><div class="sub-grid">${subKeys.map(k=>{const t=TYPES[k];return`<div class="sub-item" style="border:1px solid ${t.color}15"><div class="sub-emoji">${t.emoji}</div><p class="sub-name" style="color:${t.color}">${t.name.split(' ').slice(1).join(' ')}</p><p class="sub-tag">${t.tagline}</p></div>`;}).join('')}</div></div>`;

  html+=`<p class="prod-title">📦 추천 솔루션</p>`;
  if(recType==='boost'||recType==='both')html+=renderProduct(PRODUCTS.boost);

  html+=`
    <div class="email-box" id="emailSection">

      <div class="email-box-sub">체질별 맞춤 영양 가이드를 이메일로 보내드려요</div>

      <a class="btn-kakao" href="http://pf.kakao.com/_txixmrK/chat" target="_blank">💬 예약 문의하기</a>
    </div>
    <p class="disclaimer">※ 이 결과는 의학적 진단이 아닌 건강 습관 참고용입니다.<br>정확한 건강 상태 확인은 전문가 상담을 권장합니다.</p>
    <div style="text-align:center"><button class="btn-reset" onclick="resetQuiz()">다시 해보기</button></div>
    <div class="credit">🦕 옆집디노 · AI 세일즈 시스템</div>`;

  area.innerHTML=html;

  // Save to leads DB
  if(window.dinoSupabase){

function submitEmail(){
  const email=document.getElementById('resultEmail').value.trim();
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){alert('올바른 이메일을 입력해주세요');return;}
  if(window.dinoSupabase){window.dinoSupabase.from('leads').insert({source:'quiz',email,quiz_result:{type:calcResult()}}).then(()=>{});}
  document.getElementById('emailSection').innerHTML='<div style="padding:8px;text-align:center"><div style="font-size:32px;margin-bottom:8px">📩</div><div style="font-weight:700;font-size:15px;margin-bottom:4px">발송 완료!</div><div style="font-size:13px;color:#78716C">'+email+'로 건강 리포트를 보내드릴게요</div></div>';
}

function resetQuiz(){qIndex=0;answers=[];animating=false;showScreen('intro');}
