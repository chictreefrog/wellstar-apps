<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a14">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>📚 콘텐츠 라이브러리 — 옆집디노</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a14; --bg2: #12122a; --card: #1a1a30;
  --border: rgba(255,255,255,0.08); --text: #F5F5F7;
  --text2: rgba(255,255,255,0.7); --text3: rgba(255,255,255,0.45);
  --accent: #FF6B35; --accent2: #BF5AF2; --green: #30D158;
  --warn: #FF9F0A; --red: #FF453A;
}
body.light-theme {
  --bg: #F5F5F7; --bg2: #FFFFFF; --card: #FFFFFF;
  --border: rgba(0,0,0,0.08); --text: #1A1A2E;
  --text2: rgba(0,0,0,0.7); --text3: rgba(0,0,0,0.45);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}
.wrap { max-width: 480px; margin: 0 auto; padding: 0 16px 100px; }
.header { padding: 18px 0 14px; display:flex; align-items:center; gap:10px }
.back-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--card); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; cursor: pointer; color: var(--text);
  text-decoration: none;
}
.title-area { flex: 1 }
.title { font-size: 20px; font-weight: 800; letter-spacing: -0.5px }
.subtitle { font-size: 12px; color: var(--text2); margin-top: 2px }
.theme-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--card); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; cursor: pointer;
}
.upload-fab {
  position: fixed; bottom: 80px; right: calc(50% - 230px);
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; color: #fff; font-size: 24px; font-weight: 700;
  cursor: pointer; box-shadow: 0 4px 20px rgba(255,107,53,0.4);
  z-index: 100; display: none;
}
@media (max-width: 520px) { .upload-fab { right: 16px } }

/* 카테고리 탭 */
.cat-tabs {
  display: flex; gap: 6px; overflow-x: auto; padding: 4px 0 14px;
  scrollbar-width: none; -ms-overflow-style: none;
}
.cat-tabs::-webkit-scrollbar { display: none }
.cat-tab {
  flex-shrink: 0; padding: 8px 14px; border-radius: 20px;
  background: var(--card); border: 1px solid var(--border);
  color: var(--text2); font-size: 13px; font-weight: 600;
  cursor: pointer; white-space: nowrap; font-family: inherit;
}
.cat-tab.active {
  background: var(--accent); color: #fff; border-color: var(--accent);
}

/* 콘텐츠 카드 */
.content-grid { display: flex; flex-direction: column; gap: 12px }
.content-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden; cursor: pointer;
  transition: transform .15s;
}
.content-card:active { transform: scale(0.98) }
.card-thumb {
  width: 100%; aspect-ratio: 16/9; background: var(--bg2);
  background-size: cover; background-position: center;
  display: flex; align-items: center; justify-content: center;
  font-size: 48px; position: relative;
}
.card-thumb .play-overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,0.35);
  display: flex; align-items: center; justify-content: center;
  font-size: 40px;
}
.card-body { padding: 12px 14px }
.card-header {
  display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
  flex-wrap: wrap;
}
.cat-badge {
  font-size: 10px; padding: 2px 8px; border-radius: 10px;
  background: rgba(255,107,53,0.12); color: var(--accent);
  border: 1px solid rgba(255,107,53,0.25); font-weight: 600;
}
.team-badge {
  font-size: 10px; padding: 2px 8px; border-radius: 10px;
  background: rgba(191,90,242,0.12); color: var(--accent2);
  border: 1px solid rgba(191,90,242,0.25); font-weight: 600;
}
.global-badge {
  font-size: 10px; padding: 2px 8px; border-radius: 10px;
  background: rgba(48,209,88,0.12); color: var(--green);
  border: 1px solid rgba(48,209,88,0.25); font-weight: 600;
}
.card-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; line-height: 1.4 }
.card-desc { font-size: 12px; color: var(--text2); line-height: 1.5; margin-bottom: 8px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-meta {
  display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text3);
}

/* Empty / Loading */
.empty {
  text-align: center; padding: 60px 20px; color: var(--text2);
}
.empty-icon { font-size: 56px; margin-bottom: 12px }
.empty-text { font-size: 14px; line-height: 1.6 }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px); z-index: 1000;
  display: none; align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex }
.modal {
  background: var(--bg2); width: 100%; max-width: 480px;
  border-radius: 20px 20px 0 0; max-height: 88vh;
  display: flex; flex-direction: column; animation: slideUp .3s ease;
}
@keyframes slideUp { from { transform: translateY(100%) } to { transform: translateY(0) } }
.modal-handle {
  width: 40px; height: 4px; background: rgba(255,255,255,0.2);
  border-radius: 2px; margin: 10px auto 0;
}
.modal-header {
  padding: 14px 18px 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-size: 16px; font-weight: 700 }
.modal-close {
  background: rgba(255,255,255,0.08); border: none; color: var(--text);
  width: 32px; height: 32px; border-radius: 8px; font-size: 16px; cursor: pointer;
}
.modal-body {
  padding: 0 18px 20px; overflow-y: auto; flex: 1;
}

/* Detail */
.detail-thumb {
  width: 100%; aspect-ratio: 16/9; background: var(--bg);
  background-size: cover; background-position: center;
  border-radius: 12px; margin-bottom: 14px;
  display: flex; align-items: center; justify-content: center; font-size: 56px;
}
.detail-section { margin-bottom: 16px }
.detail-label {
  font-size: 11px; color: var(--text3); font-weight: 700;
  letter-spacing: 0.5px; margin-bottom: 4px; text-transform: uppercase;
}
.detail-content {
  font-size: 14px; color: var(--text); line-height: 1.6;
  white-space: pre-wrap; word-break: break-word;
}
.share-message-box {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px; font-size: 13px; line-height: 1.6;
  margin-bottom: 10px; white-space: pre-wrap; max-height: 200px; overflow-y: auto;
}
.btn-row { display: flex; gap: 8px; margin-top: 10px }
.btn-primary, .btn-secondary, .btn-ghost {
  flex: 1; padding: 12px; border-radius: 10px; border: none;
  font-size: 14px; font-weight: 700; cursor: pointer;
  font-family: inherit;
}
.btn-primary { background: var(--accent); color: #fff }
.btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border) }
.btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border) }

/* Upload form */
.form-group { margin-bottom: 14px }
.form-label {
  display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 600;
}
.form-input, .form-textarea, .form-select {
  width: 100%; padding: 10px 12px; border-radius: 10px;
  background: var(--card); border: 1px solid var(--border); color: var(--text);
  font-size: 14px; font-family: inherit;
}
.form-textarea { resize: vertical; min-height: 80px; max-height: 250px }
.form-input:focus, .form-textarea:focus, .form-select:focus { outline: 2px solid var(--accent) }

.file-drop {
  border: 2px dashed var(--border); border-radius: 12px; padding: 24px;
  text-align: center; cursor: pointer; transition: border-color .15s;
}
.file-drop:hover { border-color: var(--accent) }
.file-drop.has-file { border-color: var(--green); border-style: solid }
.file-drop-icon { font-size: 36px; margin-bottom: 8px }
.file-drop-text { font-size: 13px; color: var(--text2) }
.file-name {
  font-size: 12px; color: var(--green); margin-top: 6px; word-break: break-all;
}

/* Toast */
.toast {
  position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.9); color: #fff; padding: 12px 20px;
  border-radius: 24px; font-size: 13px; font-weight: 600;
  z-index: 9999; display: none; max-width: 90vw;
}

/* role 안내 배너 */
.role-banner {
  background: rgba(255,159,10,0.08); border: 1px solid rgba(255,159,10,0.25);
  border-radius: 10px; padding: 10px 12px; margin-bottom: 12px;
  font-size: 12px; color: var(--warn); line-height: 1.5;
}

/* 빌드 라벨 */
.build-label {
  position: fixed; bottom: 70px; right: 6px;
  font-size: 9px; color: rgba(128,128,128,0.4);
  z-index: 9999; pointer-events: none; font-family: monospace;
}
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <a href="/main/" class="back-btn">←</a>
    <div class="title-area">
      <div class="title">📚 콘텐츠 라이브러리</div>
      <div class="subtitle">옆집디노의 마케팅 자료 모음</div>
    </div>
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
  </div>

  <!-- role 안내 -->
  <div class="role-banner" id="roleBanner" style="display:none"></div>

  <!-- 카테고리 탭 -->
  <div class="cat-tabs" id="catTabs">
    <button class="cat-tab active" data-cat="all" onclick="setCategory('all')">전체</button>
    <button class="cat-tab" data-cat="card_news" onclick="setCategory('card_news')">🎴 카드뉴스</button>
    <button class="cat-tab" data-cat="newsletter" onclick="setCategory('newsletter')">📨 뉴스레터</button>
    <button class="cat-tab" data-cat="short_video" onclick="setCategory('short_video')">📱 숏폼</button>
    <button class="cat-tab" data-cat="long_video_link" onclick="setCategory('long_video_link')">🎬 영상링크</button>
    <button class="cat-tab" data-cat="document" onclick="setCategory('document')">📄 사업자료</button>
  </div>

  <!-- 콘텐츠 그리드 -->
  <div id="contentList">
    <div class="empty">
      <div class="empty-icon">⏳</div>
      <div class="empty-text">불러오는 중...</div>
    </div>
  </div>
</div>

<!-- 업로드 FAB (admin/leader만 표시) -->
<button class="upload-fab" id="uploadFab" onclick="openUploadModal()">+</button>

<!-- 상세 모달 -->
<div class="modal-overlay" id="detailModal" onclick="if(event.target===this)closeDetail()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="detailTitle">콘텐츠 상세</div>
      <button class="modal-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
  </div>
</div>

<!-- 업로드 모달 -->
<div class="modal-overlay" id="uploadModal" onclick="if(event.target===this)closeUploadModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">📤 콘텐츠 업로드</div>
      <button class="modal-close" onclick="closeUploadModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">카테고리 *</label>
        <select class="form-select" id="up-category">
          <option value="card_news">🎴 카드뉴스</option>
          <option value="newsletter">📨 뉴스레터</option>
          <option value="short_video">📱 숏폼 영상</option>
          <option value="long_video_link">🎬 영상 링크 (YouTube/Vimeo)</option>
          <option value="document">📄 사업 자료 (PDF/PPT)</option>
        </select>
      </div>

      <div class="form-group" id="visibilityGroup" style="display:none">
        <label class="form-label">공개 범위 * (admin 전용)</label>
        <select class="form-select" id="up-visibility">
          <option value="global">🌐 전체 공개 (모든 사용자)</option>
          <option value="team">👥 내 팀만 (디노그룹)</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">제목 *</label>
        <input type="text" class="form-input" id="up-title" placeholder="예: 5월호 카드뉴스 9장">
      </div>

      <div class="form-group">
        <label class="form-label">설명 (선택)</label>
        <textarea class="form-textarea" id="up-description" placeholder="이 콘텐츠의 용도/내용을 짧게..."></textarea>
      </div>

      <div class="form-group" id="externalUrlGroup" style="display:none">
        <label class="form-label">영상 URL *</label>
        <input type="url" class="form-input" id="up-external-url" placeholder="https://youtube.com/...">
      </div>

      <div class="form-group" id="fileGroup">
        <label class="form-label">파일 업로드 *</label>
        <div class="file-drop" id="fileDrop" onclick="document.getElementById('fileInput').click()">
          <div class="file-drop-icon">📎</div>
          <div class="file-drop-text">탭해서 파일 선택<br><small style="font-size:10px;color:var(--text3)">최대 100MB · 이미지/PDF/영상</small></div>
          <div class="file-name" id="fileName"></div>
        </div>
        <input type="file" id="fileInput" style="display:none" onchange="onFileSelected(event)">
      </div>

      <div class="form-group">
        <label class="form-label">공유 메시지 (선택)</label>
        <textarea class="form-textarea" id="up-share-message" placeholder="이 콘텐츠를 공유할 때 카톡으로 함께 보낼 멘트..."></textarea>
        <div style="font-size:11px;color:var(--text3);margin-top:4px">파트너들이 이 콘텐츠를 카톡 공유할 때 자동 복사됩니다</div>
      </div>

      <div class="btn-row">
        <button class="btn-secondary" onclick="closeUploadModal()">취소</button>
        <button class="btn-primary" id="uploadSubmitBtn" onclick="submitUpload()">업로드</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="build-label" id="buildLabel">library-v1</div>

<script>
const BUILD_ID = 'library-v1-2026-05-28';
console.log('[library]', BUILD_ID);

const CATEGORY_INFO = {
  card_news: { icon: '🎴', label: '카드뉴스' },
  newsletter: { icon: '📨', label: '뉴스레터' },
  short_video: { icon: '📱', label: '숏폼' },
  long_video_link: { icon: '🎬', label: '영상링크' },
  document: { icon: '📄', label: '사업자료' }
};

let myProfile = null;
let myRole = 'partner';
let currentCategory = 'all';
let allContents = [];
let selectedFile = null;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => t.style.display = 'none', 2500);
}

async function waitSupabase(maxMs) {
  if (window.dinoSupabase) return true;
  await Promise.race([
    new Promise(r => window.addEventListener('dino-supabase-ready', r, { once: true })),
    new Promise(r => setTimeout(r, maxMs || 5000))
  ]);
  return !!window.dinoSupabase;
}

async function loadProfile() {
  const ok = await waitSupabase(5000);
  if (!ok) return null;
  const { data: { session } } = await window.dinoSupabase.auth.getSession();
  if (!session) return null;
  const { data } = await window.dinoSupabase
    .from('profiles')
    .select('id, role, team_id, display_name, business_code')
    .eq('id', session.user.id)
    .single();
  return data;
}

async function loadContents() {
  const ok = await waitSupabase(5000);
  const list = document.getElementById('contentList');
  if (!ok) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">연결 실패<br>새로고침해주세요</div></div>';
    return;
  }
  try {
    let q = window.dinoSupabase.from('contents')
      .select('*')
      .eq('is_active', true)
      .order('is_pinned', { ascending: false })
      .order('created_at', { ascending: false })
      .limit(100);
    const { data, error } = await q;
    if (error) {
      console.error('[library] load contents error:', error);
      list.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">로딩 실패</div></div>';
      return;
    }
    allContents = data || [];
    renderContents();
  } catch (e) {
    console.error('[library] load error:', e);
    list.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">로딩 실패</div></div>';
  }
}

function renderContents() {
  const list = document.getElementById('contentList');
  const filtered = currentCategory === 'all'
    ? allContents
    : allContents.filter(c => c.category === currentCategory);

  if (!filtered.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">아직 이 카테고리에 콘텐츠가 없어요${myRole === 'admin' || myRole === 'leader' ? '<br><small>우하단 + 버튼으로 업로드해보세요</small>' : ''}</div></div>`;
    return;
  }

  list.innerHTML = '<div class="content-grid">' + filtered.map(c => {
    const cat = CATEGORY_INFO[c.category] || { icon: '📦', label: c.category };
    const isVideo = c.category === 'short_video' || c.category === 'long_video_link';
    const thumbStyle = c.thumbnail_url
      ? `background-image:url('${c.thumbnail_url}')`
      : '';
    const thumbContent = c.thumbnail_url ? '' : cat.icon;
    const playOverlay = (isVideo && c.thumbnail_url) ? '<div class="play-overlay">▶</div>' : '';
    const visibilityBadge = c.visibility === 'global'
      ? '<span class="global-badge">🌐 전체</span>'
      : '<span class="team-badge">👥 팀</span>';
    return `
      <div class="content-card" onclick="openDetail('${c.id}')">
        <div class="card-thumb" style="${thumbStyle}">${thumbContent}${playOverlay}</div>
        <div class="card-body">
          <div class="card-header">
            <span class="cat-badge">${cat.icon} ${cat.label}</span>
            ${visibilityBadge}
            ${c.is_pinned ? '<span style="font-size:11px">📌</span>' : ''}
          </div>
          <div class="card-title">${escapeHtml(c.title)}</div>
          ${c.description ? `<div class="card-desc">${escapeHtml(c.description)}</div>` : ''}
          <div class="card-meta">
            <span>👁 ${c.view_count || 0}</span>
            <span>📤 ${c.share_count || 0}</span>
            <span style="margin-left:auto">${formatDate(c.created_at)}</span>
          </div>
        </div>
      </div>`;
  }).join('') + '</div>';
}

function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function formatDate(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diff = Math.floor((now - d) / 86400000);
  if (diff === 0) return '오늘';
  if (diff === 1) return '어제';
  if (diff < 7) return diff + '일 전';
  return d.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' });
}

function setCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll('.cat-tab').forEach(b =>
    b.classList.toggle('active', b.dataset.cat === cat)
  );
  renderContents();
}

// ═══ 상세 모달 ═══
async function openDetail(id) {
  const c = allContents.find(x => x.id === id);
  if (!c) return;
  const cat = CATEGORY_INFO[c.category];

  // view_count 증가 (비동기, 응답 안 기다림)
  window.dinoSupabase.rpc('increment_content_view', { content_id: id }).catch(() => {
    // RPC가 없으면 직접 update (조회수는 정확하지 않아도 OK)
    window.dinoSupabase.from('contents')
      .update({ view_count: (c.view_count || 0) + 1 })
      .eq('id', id).then(() => {});
  });

  document.getElementById('detailTitle').textContent = c.title;
  const body = document.getElementById('detailBody');

  const thumbStyle = c.thumbnail_url ? `background-image:url('${c.thumbnail_url}')` : '';
  const thumbContent = c.thumbnail_url ? '' : cat.icon;

  const downloadOrLink = c.external_url
    ? `<a href="${c.external_url}" target="_blank" rel="noopener" class="btn-primary" style="display:flex;align-items:center;justify-content:center;text-decoration:none">🎬 영상 열기</a>`
    : c.file_url
      ? `<a href="${c.file_url}" target="_blank" download class="btn-primary" style="display:flex;align-items:center;justify-content:center;text-decoration:none">⬇️ 다운로드</a>`
      : '';

  const adminActions = (myRole === 'admin' || c.owner_id === myProfile?.id)
    ? `<div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn-ghost" onclick="deleteContent('${c.id}')" style="color:var(--red);border-color:rgba(255,69,58,0.3)">🗑️ 삭제</button>
        <button class="btn-ghost" onclick="togglePin('${c.id}', ${!c.is_pinned})">${c.is_pinned ? '📌 핀 해제' : '📌 상단 고정'}</button>
       </div>`
    : '';

  body.innerHTML = `
    <div class="detail-thumb" style="${thumbStyle}">${thumbContent}</div>

    ${c.description ? `
      <div class="detail-section">
        <div class="detail-label">설명</div>
        <div class="detail-content">${escapeHtml(c.description)}</div>
      </div>
    ` : ''}

    ${c.content_text ? `
      <div class="detail-section">
        <div class="detail-label">본문</div>
        <div class="detail-content">${escapeHtml(c.content_text)}</div>
      </div>
    ` : ''}

    ${c.share_message ? `
      <div class="detail-section">
        <div class="detail-label">📤 공유 멘트</div>
        <div class="share-message-box">${escapeHtml(c.share_message)}</div>
      </div>
    ` : ''}

    <div class="btn-row">
      ${downloadOrLink}
      <button class="btn-secondary" onclick="shareContent('${c.id}')">📤 공유</button>
    </div>
    ${adminActions}
  `;

  document.getElementById('detailModal').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailModal').classList.remove('open');
}

async function shareContent(id) {
  const c = allContents.find(x => x.id === id);
  if (!c) return;
  const url = c.external_url || c.file_url || location.href;
  const text = c.share_message
    ? c.share_message + '\n\n' + url
    : `${c.title}\n${c.description || ''}\n\n${url}`;

  let method = 'link_copy';
  try {
    if (navigator.share) {
      await navigator.share({ title: c.title, text, url });
      method = 'native_share';
    } else {
      await navigator.clipboard.writeText(text);
      method = 'link_copy';
      showToast('공유 메시지가 복사됐어요');
    }
    // share_count 증가 + 로그
    window.dinoSupabase.from('contents')
      .update({ share_count: (c.share_count || 0) + 1 })
      .eq('id', id).then(() => {});
    window.dinoSupabase.from('content_shares').insert({
      content_id: id,
      shared_by: myProfile.id,
      shared_via: method
    }).then(() => {});
  } catch (e) {
    if (e?.name !== 'AbortError') showToast('공유 실패');
  }
}

async function deleteContent(id) {
  if (!confirm('정말 삭제할까요? 되돌릴 수 없어요.')) return;
  const { error } = await window.dinoSupabase
    .from('contents').update({ is_active: false }).eq('id', id);
  if (error) { showToast('삭제 실패'); return; }
  showToast('삭제됐어요');
  closeDetail();
  loadContents();
}

async function togglePin(id, value) {
  const { error } = await window.dinoSupabase
    .from('contents').update({ is_pinned: value }).eq('id', id);
  if (error) { showToast('실패'); return; }
  showToast(value ? '상단 고정됨' : '핀 해제됨');
  closeDetail();
  loadContents();
}

// ═══ 업로드 ═══
function openUploadModal() {
  // 카테고리에 따라 파일/URL 필드 토글
  const catEl = document.getElementById('up-category');
  catEl.onchange = () => updateUploadFields(catEl.value);
  updateUploadFields(catEl.value);

  // admin이면 visibility 선택 노출, leader면 자동 team
  document.getElementById('visibilityGroup').style.display = myRole === 'admin' ? 'block' : 'none';

  document.getElementById('uploadModal').classList.add('open');
}
function closeUploadModal() {
  document.getElementById('uploadModal').classList.remove('open');
  // 입력 초기화
  ['up-title','up-description','up-external-url','up-share-message'].forEach(id => {
    document.getElementById(id).value = '';
  });
  selectedFile = null;
  document.getElementById('fileName').textContent = '';
  document.getElementById('fileDrop').classList.remove('has-file');
}

function updateUploadFields(cat) {
  const isLink = cat === 'long_video_link';
  document.getElementById('externalUrlGroup').style.display = isLink ? 'block' : 'none';
  document.getElementById('fileGroup').style.display = isLink ? 'none' : 'block';
}

function onFileSelected(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.size > 100 * 1024 * 1024) {
    showToast('파일이 너무 커요 (최대 100MB)');
    return;
  }
  selectedFile = file;
  document.getElementById('fileName').textContent = file.name + ' (' + (file.size / 1024 / 1024).toFixed(1) + 'MB)';
  document.getElementById('fileDrop').classList.add('has-file');
}

async function submitUpload() {
  const btn = document.getElementById('uploadSubmitBtn');
  const category = document.getElementById('up-category').value;
  const title = document.getElementById('up-title').value.trim();
  const description = document.getElementById('up-description').value.trim();
  const shareMessage = document.getElementById('up-share-message').value.trim();
  const externalUrl = document.getElementById('up-external-url').value.trim();

  if (!title) { showToast('제목을 입력하세요'); return; }
  if (category === 'long_video_link') {
    if (!externalUrl) { showToast('영상 URL을 입력하세요'); return; }
  } else {
    if (!selectedFile) { showToast('파일을 선택하세요'); return; }
  }

  btn.disabled = true; btn.textContent = '업로드 중...';

  try {
    let file_url = null;
    let thumbnail_url = null;

    // 파일 업로드
    if (selectedFile) {
      const ext = selectedFile.name.split('.').pop().toLowerCase();
      const path = `${myProfile.id}/${Date.now()}_${Math.random().toString(36).slice(2,7)}.${ext}`;
      const { error: upErr } = await window.dinoSupabase.storage
        .from('contents').upload(path, selectedFile);
      if (upErr) throw upErr;
      const { data: { publicUrl } } = window.dinoSupabase.storage
        .from('contents').getPublicUrl(path);
      file_url = publicUrl;
      // 이미지면 썸네일로도 사용
      if (selectedFile.type.startsWith('image/')) thumbnail_url = publicUrl;
    }

    // visibility 결정
    let visibility = 'team';
    let team_id = myProfile.team_id;
    if (myRole === 'admin') {
      visibility = document.getElementById('up-visibility').value;
      if (visibility === 'global') team_id = null;
    }

    // DB insert
    const { error: dbErr } = await window.dinoSupabase.from('contents').insert({
      owner_id: myProfile.id,
      owner_role: myRole,
      visibility,
      team_id,
      category,
      title,
      description: description || null,
      file_url,
      thumbnail_url,
      external_url: externalUrl || null,
      share_message: shareMessage || null
    });
    if (dbErr) throw dbErr;

    showToast('업로드 완료!');
    closeUploadModal();
    loadContents();
  } catch (e) {
    console.error('[library] upload error:', e);
    showToast('업로드 실패 — ' + (e.message || '다시 시도'));
  } finally {
    btn.disabled = false; btn.textContent = '업로드';
  }
}

// ═══ 초기화 ═══
let __dataLoadedOnce = false;
async function tryInit(reason) {
  if (__dataLoadedOnce) return;
  const ok = await waitSupabase(5000);
  if (!ok) return;
  const profile = await loadProfile();
  if (!profile) return;
  __dataLoadedOnce = true;
  myProfile = profile;
  myRole = profile.role || 'partner';
  console.log('[library] init —', reason, 'role:', myRole);

  // role 안내 + 업로드 FAB 표시
  const banner = document.getElementById('roleBanner');
  if (myRole === 'admin') {
    document.getElementById('uploadFab').style.display = 'flex';
    banner.style.display = 'block';
    banner.innerHTML = '👑 <b>admin</b> 권한으로 전체 공개 또는 디노그룹 콘텐츠를 업로드할 수 있어요';
  } else if (myRole === 'leader') {
    document.getElementById('uploadFab').style.display = 'flex';
    banner.style.display = 'block';
    banner.innerHTML = '🌟 <b>리더</b> 권한으로 내 팀 콘텐츠를 업로드할 수 있어요. 옆집디노 공식 콘텐츠도 함께 표시됩니다';
  }

  loadContents();
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('buildLabel').textContent = BUILD_ID;

  // DinoAuth.init() 명시 호출 (롤플레이 누락 버그에서 배움)
  if (window.DinoAuth?.init) {
    window.DinoAuth.init().catch(e => console.error('DinoAuth.init failed:', e));
  }

  // 멀티 트리거
  if (window.dinoSupabase) {
    tryInit('supabase-already-ready');
  } else {
    window.addEventListener('dino-supabase-ready', () => tryInit('supabase-ready'), { once: true });
  }
  window.addEventListener('dino-auth-change', (e) => {
    if (e.detail?.user) {
      __dataLoadedOnce = false;
      tryInit('auth-change');
    }
  });
  setTimeout(() => tryInit('fallback-1s'), 1000);
  setTimeout(() => tryInit('fallback-3s'), 3000);
});

// 테마 토글
function toggleTheme() {
  const isLight = document.body.classList.toggle('light-theme');
  localStorage.setItem('dino_theme', isLight ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = isLight ? '☀️' : '🌙';
}
(function applyTheme() {
  const t = localStorage.getItem('dino_theme');
  if (t === 'light') {
    document.body.classList.add('light-theme');
  }
})();

// 서비스워커 + 자동 업데이트
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') reg.update().catch(() => {});
    });
  }).catch(() => {});
  let _reloaded = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (_reloaded) return;
    _reloaded = true;
    window.location.reload();
  });
}
